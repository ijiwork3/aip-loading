<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>v04-12</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  width:100vw; height:100vh; overflow:hidden;
  background:linear-gradient(158deg,#E8DFFB 0%,#DDE9FB 46%,#D0E7F9 100%);
  display:flex; align-items:center; justify-content:center;
  font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  position:relative;
}

.bg-orb { position:fixed; border-radius:50%; pointer-events:none; }
.orb1 { width:560px;height:560px;background:radial-gradient(circle at 40% 40%,rgba(182,142,255,0.42) 0%,transparent 62%);filter:blur(88px);opacity:0.72;top:-140px;left:-120px;animation:orb1 16s ease-in-out infinite alternate; }
.orb2 { width:460px;height:460px;background:radial-gradient(circle at 55% 55%,rgba(102,198,255,0.38) 0%,transparent 62%);filter:blur(92px);opacity:0.68;bottom:-110px;right:-90px;animation:orb2 20s ease-in-out infinite alternate; }
.orb3 { width:300px;height:300px;background:radial-gradient(circle at 50% 50%,rgba(198,168,255,0.34) 0%,transparent 62%);filter:blur(72px);opacity:0.62;top:38%;left:62%;animation:orb3 13s ease-in-out infinite alternate; }
.orb4 { width:220px;height:220px;background:radial-gradient(circle at 50% 50%,rgba(152,208,255,0.32) 0%,transparent 62%);filter:blur(62px);opacity:0.58;top:10%;right:15%;animation:orb4 9s ease-in-out infinite alternate; }
@keyframes orb1{0%{transform:translate(0,0)scale(1)}100%{transform:translate(65px,45px)scale(1.18)}}
@keyframes orb2{0%{transform:translate(0,0)scale(1)}100%{transform:translate(-55px,-38px)scale(1.12)}}
@keyframes orb3{0%{transform:translate(0,0)scale(1)}100%{transform:translate(-42px,32px)scale(0.88)}}
@keyframes orb4{0%{transform:translate(0,0)scale(1)}100%{transform:translate(20px,-25px)scale(1.08)}}

.scene {
  position:relative; width:560px; height:430px;
  display:flex; align-items:center; justify-content:center;
  perspective:1000px; z-index:1;
}

/* ── 슬라이드 배경 ── */
.base-slide {
  position:absolute; width:360px; height:240px;
  background:rgba(252,249,255,0.88);
  backdrop-filter:blur(32px) saturate(1.9);
  -webkit-backdrop-filter:blur(32px) saturate(1.9);
  border-radius:16px;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.98) inset,
    0 40px 90px rgba(108,82,198,0.18),
    0 16px 40px rgba(92,112,198,0.13),
    0 5px 12px rgba(108,82,198,0.07),
    inset 0 -1px 0 rgba(108,82,198,0.05);
  border:1px solid rgba(255,255,255,0.92);
  overflow:hidden;
}

/* ── MC: 슬라이드 상단 header — 처음부터 항상 표시 ── */
.mc-header {
  position:absolute;
  width:360px; height:44px;
  top:calc(50% - 120px); left:calc(50% - 180px);
  background:linear-gradient(135deg, rgba(228,215,255,0.82) 0%, rgba(210,225,255,0.74) 100%);
  border-radius:16px 16px 0 0;
  border-bottom:1px solid rgba(255,255,255,0.45);
  display:flex; align-items:center;
  padding:0 16px; gap:8px;
  z-index:3;
  /* subtle inner top highlight */
  box-shadow:
    0 1px 0 rgba(255,255,255,0.90) inset,
    0 -1px 0 rgba(148,108,228,0.08) inset;
}
.mc-dot { width:7px;height:7px;border-radius:50%;background:rgba(138,105,218,0.48);flex-shrink:0; }
.mc-bar {
  flex:1; height:6px; border-radius:3px;
  background:linear-gradient(90deg,rgba(122,82,215,0.52),rgba(82,132,228,0.38));
  width:0%; position:relative; overflow:hidden;
}
.mc-bar::after {
  content:''; position:absolute; top:0;right:0;bottom:0;width:20px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6));
  border-radius:0 3px 3px 0;
}

/* ── BC: MC 아래 body 영역 — fly-in으로 착지 ── */
.bc-body {
  position:absolute;
  width:360px; height:196px;
  top:calc(50% - 120px + 44px); left:calc(50% - 180px);
  border-radius:0 0 16px 16px;
  overflow:hidden;
  display:none; /* JS에서 제어 */
  z-index:3;
}

/* BC text area: 라벤더 배경 + 세로 구분선 + 그라데이션 */
.bc-text {
  flex:1; padding:16px 14px 14px 16px;
  display:flex; flex-direction:column; gap:7px;
  background:linear-gradient(160deg, rgba(248,244,255,0.95) 0%, rgba(238,230,255,0.90) 100%);
  position:relative;
}
/* bc-text 내부 상단 미묘한 구분 */
.bc-text::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, rgba(255,255,255,0.0), rgba(255,255,255,0.85), rgba(255,255,255,0.0));
}
/* bc-text 내부 하단 페이드 */
.bc-text::after {
  content:'';
  position:absolute;
  bottom:0; left:0; right:0; height:28px;
  background:linear-gradient(0deg, rgba(238,230,255,0.6), transparent);
  pointer-events:none;
}

.trl {
  height:5px; border-radius:3px;
  background:linear-gradient(90deg, rgba(128,92,215,0.22), rgba(108,82,198,0.14));
  width:0%; position:relative; overflow:hidden;
  flex-shrink:0;
}
.trl::after {
  content:''; position:absolute; top:0;left:-60%;bottom:0;width:60%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.70),transparent);
  animation:shimmer 2.4s ease-in-out infinite;
}
@keyframes shimmer{0%{left:-60%}100%{left:110%}}

/* BC image area: 더 정교한 파란 영역 */
.bc-image {
  width:116px; flex-shrink:0;
  background:linear-gradient(150deg,
    rgba(148,210,255,0.62) 0%,
    rgba(118,188,248,0.70) 40%,
    rgba(138,175,248,0.65) 100%
  );
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
}
/* 이미지 영역 내부 하이라이트 */
.bc-image::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0; height:40%;
  background:linear-gradient(180deg, rgba(255,255,255,0.22) 0%, transparent 100%);
  pointer-events:none;
}
/* 이미지 영역 좌측 경계선 */
.bc-image::after {
  content:'';
  position:absolute;
  top:8px; bottom:8px; left:0; width:1px;
  background:linear-gradient(180deg,
    transparent,
    rgba(255,255,255,0.55) 30%,
    rgba(255,255,255,0.55) 70%,
    transparent
  );
}

.img-fill {
  width:80%; height:72%;
  background:linear-gradient(135deg,
    rgba(180,225,255,0.50) 0%,
    rgba(148,200,252,0.65) 50%,
    rgba(168,215,255,0.50) 100%
  );
  background-size:200% 200%;
  animation:imgAnim 3.5s ease-in-out infinite;
  display:flex; align-items:center; justify-content:center;
  opacity:0;
  border-radius:7px;
  border:1px solid rgba(255,255,255,0.55);
  box-shadow:0 2px 8px rgba(82,148,228,0.18), 0 1px 0 rgba(255,255,255,0.70) inset;
}
@keyframes imgAnim{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.img-icon { width:28px;height:22px;border:1.5px solid rgba(92,160,222,0.48);border-radius:4px;position:relative; background:rgba(255,255,255,0.22); }
.img-icon::after { content:'';position:absolute;bottom:0;left:0;right:0;height:10px;background:linear-gradient(135deg,rgba(148,205,248,0.55),rgba(118,175,235,0.65));border-radius:0 0 3px 3px; }

/* ── 덱 ── */
.deck-container {
  position:absolute; width:360px; height:240px;
  left:calc(50% - 180px); top:calc(50% - 138px);
  transform-style:preserve-3d; opacity:0;
}
.deck-card {
  position:absolute; width:360px; height:240px;
  background:linear-gradient(145deg,rgba(250,247,255,0.94),rgba(242,236,255,0.90));
  backdrop-filter:blur(28px) saturate(1.8);
  -webkit-backdrop-filter:blur(28px) saturate(1.8);
  border-radius:14px; border:1px solid rgba(255,255,255,0.82);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.97) inset,
    0 8px 21px rgba(108,82,198,0.055),
    0 4px 8px rgba(92,112,198,0.036),
    0 1px 2px rgba(108,82,198,0.021),
    inset 0 -1px 0 rgba(108,82,198,0.015);
  overflow:hidden; opacity:0;
  transform:translateZ(0px) translateY(0px);
  backface-visibility:hidden;
  transform-origin:bottom center;
}
.dc-body { padding:16px 18px; width:100%; height:100%; display:flex; flex-direction:column; }
.dc-hbar { height:9px;border-radius:5px;background:linear-gradient(90deg,rgba(128,78,215,0.52),rgba(82,142,228,0.42));margin-bottom:14px;width:62%;flex-shrink:0; }
.dc-line { height:5px;border-radius:3px;background:rgba(118,88,210,0.22);margin-bottom:8px;flex-shrink:0; }
.dc-img { flex:1;border-radius:10px;background:linear-gradient(148deg,rgba(205,182,255,0.46),rgba(170,212,255,0.40));box-shadow:0 1px 0 rgba(255,255,255,0.92) inset;margin-top:4px; }
.dc-two { flex:1;display:flex;gap:12px;margin-top:4px; }
.dc-col { flex:1;border-radius:8px;background:rgba(128,95,215,0.14);box-shadow:0 1px 0 rgba(255,255,255,0.88) inset; }

/* ── 파티클 ── */
.particle-container { position:absolute;width:100%;height:100%;pointer-events:none;overflow:hidden;border-radius:14px; }
</style>
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>
<div class="bg-orb orb4"></div>

<div class="scene" id="scene">
  <!-- 슬라이드 배경 -->
  <div class="base-slide" id="baseSlide"></div>

  <!-- MC: 처음부터 항상 표시 -->
  <div class="mc-header" id="mcHeader">
    <div class="mc-dot"></div>
    <div class="mc-bar" id="mcBar"></div>
  </div>

  <!-- BC: 소스 카드에서 날아와 MC 아래 착지 -->
  <div class="bc-body" id="bcBody">
    <div class="bc-text" id="bcText">
      <div class="trl" id="trl0"></div>
      <div class="trl" id="trl1"></div>
      <div class="trl" id="trl2"></div>
      <div class="trl" id="trl3"></div>
      <div class="trl" id="trl4" style="height:4px"></div>
    </div>
    <div class="bc-image" id="bcImage">
      <div class="img-fill" id="imgFill"><div class="img-icon"></div></div>
    </div>
  </div>

  <!-- 덱 -->
  <div class="deck-container" id="deckContainer">
    <div class="deck-card" id="dc0">
      <div class="dc-body"><div class="dc-hbar"></div><div class="dc-line"></div><div class="dc-line"></div><div class="dc-line"></div><div class="dc-img"></div></div>
    </div>
    <div class="deck-card" id="dc1">
      <div class="dc-body"><div class="dc-hbar"></div><div class="dc-two"><div class="dc-col"></div><div class="dc-col"></div></div></div>
    </div>
    <div class="deck-card" id="dc2">
      <div class="dc-body"><div class="dc-hbar"></div><div class="dc-line"></div><div class="dc-line"></div><div class="dc-line"></div><div class="dc-line"></div></div>
    </div>
    <div class="deck-card" id="dc3">
      <div class="dc-body"><div class="dc-img" style="flex:0.55"></div><div class="dc-hbar" style="margin-top:12px"></div><div class="dc-line"></div><div class="dc-line"></div></div>
    </div>
    <!-- dc4: 1,2단계 완성형 layout -->
    <div class="deck-card" id="dc4">
      <div class="dc-body">
        <div class="dc-hbar"></div>
        <div style="flex:1;display:flex;gap:10px;margin-top:4px;">
          <div style="flex:1;display:flex;flex-direction:column;gap:6px;padding-top:2px;">
            <div class="dc-line" style="width:88%"></div>
            <div class="dc-line" style="width:72%"></div>
            <div class="dc-line" style="width:92%"></div>
            <div class="dc-line" style="width:62%"></div>
          </div>
          <div style="width:88px;flex-shrink:0;border-radius:8px;background:linear-gradient(148deg,rgba(148,202,255,0.52),rgba(178,168,255,0.40));box-shadow:0 1px 0 rgba(255,255,255,0.88) inset;"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="particle-container" id="particleContainer"></div>
</div>

<script>
const STAGE = 7000;
const REPEAT = 3;

// DOM
const scene        = document.getElementById('scene');
const baseSlide    = document.getElementById('baseSlide');
const mcHeader     = document.getElementById('mcHeader');
const mcBar        = document.getElementById('mcBar');
const bcBody       = document.getElementById('bcBody');
const bcText       = document.getElementById('bcText');
const bcImage      = document.getElementById('bcImage');
const imgFill      = document.getElementById('imgFill');
const trlEls       = [0,1,2,3,4].map(i=>document.getElementById('trl'+i));
const deckContainer= document.getElementById('deckContainer');
const deckCards    = [0,1,2,3,4].map(i=>document.getElementById('dc'+i));
const particleCont = document.getElementById('particleContainer');

// easing
const easeOut  = t => 1-Math.pow(1-t,3);
const easeOut4 = t => 1-Math.pow(1-t,4);
const easeOutB = t => { const c=1.70158+1; return 1+c*Math.pow(t-1,3)+1.70158*Math.pow(t-1,2); };
const easeIO   = t => t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
const easeInOut4 = t => t<.5?8*t*t*t*t:1-Math.pow(-2*t+2,4)/2;
const lerp     = (a,b,t) => a+(b-a)*t;

// async utils
const raf2  = fn => setTimeout(()=>fn(performance.now()),16);
const waitMs= ms => new Promise(r=>setTimeout(r,ms));
function animA(dur,ease,cb){
  return new Promise(res=>{
    const s=performance.now();
    function f(n){ const t=Math.min((n-s)/dur,1); cb(ease(t),t); if(t<1)raf2(f); else res(); }
    raf2(f);
  });
}

// particle
let particleFired=false, particleStyleOk=false;
function fireParticles(){
  if(particleFired)return; particleFired=true;
  if(!particleStyleOk){
    particleStyleOk=true;
    const s=document.createElement('style');
    s.textContent='@keyframes pA{0%{transform:translate(-50%,-50%) translate(0,0) scale(1);opacity:.95}100%{transform:translate(-50%,-50%) translate(var(--px),var(--py)) scale(0);opacity:0}}';
    document.head.appendChild(s);
  }
  particleCont.innerHTML='';
  const cols=['#a882d7','#8ac3ea','#d4aaf2','#72ccde','#c8a5f0','#55c890'];
  for(let i=0;i<22;i++){
    const p=document.createElement('div');
    const a=(i/22)*Math.PI*2, d=55+Math.random()*52;
    const col=cols[Math.floor(Math.random()*cols.length)], sz=3+Math.random()*5;
    p.style.cssText=`position:absolute;left:50%;top:50%;width:${sz}px;height:${sz}px;border-radius:50%;background:${col};opacity:0;animation:pA ${.7+Math.random()*.5}s ${Math.random()*.15}s ease-out forwards;--px:${Math.cos(a)*d}px;--py:${Math.sin(a)*d}px`;
    particleCont.appendChild(p);
  }
}

// ── reset ──
function resetMC(){
  mcHeader.style.opacity='1';
  mcBar.style.width='0%';
}
function resetBC(){
  bcBody.style.display='none';
  bcBody.style.opacity='';
  bcBody.style.transform='';
  bcBody.style.transition='none';
  imgFill.style.opacity='0';
  trlEls.forEach(el=>{ el.style.width='0%'; });
}
function resetDeck(){
  deckContainer.style.opacity='0';
  deckCards.forEach((dc,i)=>{
    dc.style.opacity='0';
    dc.style.transform='translateZ(0) translateY(0) rotate(0deg)';
    dc.style.zIndex=String(i+1);
  });
  particleFired=false;
  particleCont.innerHTML='';
}
function resetAll(){
  baseSlide.style.opacity='1';
  resetMC();
  resetBC();
  resetDeck();
}

// ── Stage 0: MC 고정 + BC fly-in ──
async function stage0Seq(){
  // MC bar 채우기
  await animA(520,easeOut, e=>{ mcBar.style.width=(e*100)+'%'; });
  await waitMs(380);

  // 소스 카드 — 더 정교한 디자인
  const PCW=118, PCH=78;
  const pcX=560-PCW-24, pcY=430-PCH-24;

  const src=document.createElement('div');
  src.style.cssText=`position:absolute;left:${pcX}px;top:${pcY}px;width:${PCW}px;height:${PCH}px;border-radius:10px;
    background:rgba(248,244,255,0.97);
    border:1px solid rgba(255,255,255,0.95);
    box-shadow:
      0 12px 32px rgba(108,82,198,0.20),
      0 4px 10px rgba(108,82,198,0.14),
      0 1px 0 rgba(255,255,255,0.99) inset,
      inset 0 -1px 0 rgba(108,82,198,0.06);
    overflow:hidden;opacity:0;z-index:20;transition:none`;
  src.innerHTML=`
    <div style="position:absolute;inset:0;display:flex;">
      <div style="flex:1;padding:9px 10px;display:flex;flex-direction:column;gap:5px;justify-content:center;
        background:linear-gradient(160deg, rgba(248,244,255,0.95) 0%, rgba(238,230,255,0.88) 100%);">
        <div style="height:3px;border-radius:2px;background:linear-gradient(90deg,rgba(108,82,198,0.32),rgba(82,132,228,0.22));width:90%"></div>
        <div style="height:3px;border-radius:2px;background:rgba(108,82,198,0.18);width:76%"></div>
        <div style="height:3px;border-radius:2px;background:rgba(108,82,198,0.14);width:84%"></div>
        <div style="height:2px;border-radius:2px;background:rgba(108,82,198,0.10);width:62%"></div>
      </div>
      <div style="width:35%;
        background:linear-gradient(150deg,rgba(148,210,255,0.62),rgba(118,188,248,0.72));
        border-radius:0 10px 10px 0;flex-shrink:0;position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(180deg,rgba(255,255,255,0.20),transparent)"></div>
        <div style="position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:18px;height:14px;border:1.5px solid rgba(92,160,222,0.45);border-radius:3px;background:rgba(255,255,255,0.18);">
          <div style="position:absolute;bottom:0;left:0;right:0;height:6px;background:linear-gradient(135deg,rgba(148,205,248,0.5),rgba(118,175,235,0.6));border-radius:0 0 2px 2px"></div>
        </div>
      </div>
    </div>
    <div style="position:absolute;top:5px;left:8px;font-size:5.5px;font-weight:700;color:rgba(108,85,200,0.35);letter-spacing:.06em;text-transform:uppercase">Content</div>
  `;
  scene.appendChild(src);

  // 소스 카드 fade-in — 더 부드럽게
  await animA(400,easeOut4, e=>{ src.style.opacity=String(e); });
  await waitMs(260);

  // highlight pulse — 더 정교한 glow
  src.style.transition='box-shadow 0.18s ease, transform 0.18s ease';
  src.style.boxShadow='0 0 0 2px rgba(128,88,218,0.50), 0 0 16px rgba(128,88,218,0.25), 0 12px 32px rgba(108,82,198,0.24), 0 1px 0 rgba(255,255,255,0.99) inset';
  src.style.transform='scale(1.02)';
  await waitMs(220);
  src.style.boxShadow='0 12px 32px rgba(108,82,198,0.20), 0 4px 10px rgba(108,82,198,0.14), 0 1px 0 rgba(255,255,255,0.99) inset';
  src.style.transform='scale(1)';
  src.style.transition='none';
  await waitMs(140);

  // BC fly-in: 소스 카드 위치 → MC 바로 아래 착지
  const BCW=360, BCH=196;
  const tX=100, tY=139;
  const sc0=PCW/BCW;

  bcBody.style.display='flex';
  bcBody.style.position='absolute';
  bcBody.style.left='0'; bcBody.style.top='0';
  bcBody.style.width=BCW+'px'; bcBody.style.height=BCH+'px';
  bcBody.style.opacity='0';
  bcBody.style.transformOrigin='center center';
  bcBody.style.transform=`translate(${pcX-(BCW-PCW)/2}px,${pcY-(BCH-PCH)/2}px) scale(${sc0}) rotate(2deg)`;
  bcBody.style.transition='none';
  bcBody.style.zIndex='10';

  const sx=pcX-(BCW-PCW)/2, sy=pcY-(BCH-PCH)/2;

  // 소스 카드 fade-out 동시 진행
  animA(480,easeOut, e=>{ src.style.opacity=String(1-e); });

  // BC fly — 더 자연스러운 이징
  await animA(720,easeInOut4,(e,t)=>{
    const x=lerp(sx,tX,e);
    const y=lerp(sy,tY,e)-Math.sin(Math.PI*t)*44;
    const sc=lerp(sc0,1,easeOut4(e));
    const rz=lerp(2,0,easeOut(e));
    bcBody.style.transform=`translate(${x}px,${y}px) scale(${sc}) rotate(${rz}deg)`;
    bcBody.style.opacity=String(Math.min(e*1.9,1));
  });

  // 착지 bounce — 더 탄성감 있게
  await animA(200,t=>Math.sin(t*Math.PI),e=>{
    bcBody.style.transform=`translate(${tX}px,${tY}px) scale(${1+e*0.024}) rotate(0deg)`;
  });
  await animA(100,t=>Math.sin(t*Math.PI)*0.4,e=>{
    bcBody.style.transform=`translate(${tX}px,${tY}px) scale(${1+e*0.008}) rotate(0deg)`;
  });
  bcBody.style.transform=`translate(${tX}px,${tY}px) scale(1) rotate(0deg)`;

  // 착지 glow flash — 더 정교한 glow
  bcBody.style.boxShadow='0 0 0 2px rgba(128,82,218,0.38), 0 0 20px rgba(128,82,218,0.18), 0 10px 30px rgba(118,72,198,0.22)';
  await waitMs(200);
  bcBody.style.transition='box-shadow 0.55s ease';
  bcBody.style.boxShadow='';
  await waitMs(180);
  bcBody.style.transition='none';

  src.remove();

  // inline style 복원
  bcBody.style.cssText='display:flex;opacity:1;transform:none;position:absolute;left:calc(50% - 180px);top:calc(50% - 76px);width:360px;height:196px';

  await waitMs(2400);
}

async function runStage0(){
  for(let i=0;i<REPEAT;i++){
    resetAll();
    await stage0Seq();
    if(i<REPEAT-1){
      await new Promise(res=>{
        bcBody.style.transition='opacity 0.4s ease';
        bcBody.style.opacity='0';
        setTimeout(()=>{ bcBody.style.transition='none'; bcBody.style.display='none'; res(); },420);
      });
    }
    if(i===REPEAT-1) break;
    resetBC();
  }
  startStage1();
}

// ── Stage 1: MC+BC 콘텐츠 reveal ──
function startStage1(){
  majorStage=1; cycleCount=0;
  bcBody.style.cssText='display:flex;opacity:1;transform:none;position:absolute;left:calc(50% - 180px);top:calc(50% - 76px);width:360px;height:196px';
  mcBar.style.width='0%';
  imgFill.style.opacity='0';
  trlEls.forEach(el=>{ el.style.width='0%'; });
  cycleStart=performance.now();
  raf2(mainLoop);
}

function animStage1(el){
  const t=el/STAGE;
  baseSlide.style.opacity='1';
  mcHeader.style.opacity='1';
  bcBody.style.display='flex'; bcBody.style.opacity='1'; bcBody.style.transform='none';
  // mc bar
  mcBar.style.width=easeOut(Math.min(Math.max(t-0.02,0)/0.14,1))*100+'%';
  // image fill
  if(t>0.12) imgFill.style.opacity=String(easeOut4(Math.min((t-0.12)/0.22,1)));
  // text lines
  const d=[0.08,0.18,0.28,0.38,0.48], w=[88,72,92,62,78];
  trlEls.forEach((el,i)=>{ if(t>d[i]) el.style.width=easeOut(Math.min((t-d[i])/0.18,1))*w[i]+'%'; });
}

// ── Stage 2: deck fan-out ──
const fanAngles=[-26,-13,0,13,26];
const fanX=[-52,-26,0,26,52];
const cardZ=[-64,-48,-32,-16,0];
const cardY=[-20,-15,-10,-5,0];

function animStage2(el){
  const t=el/STAGE;

  // MC+BC+slide → deck cross-fade
  if(t<0.22){
    const f=easeOut(Math.min(t/0.22,1));
    [mcHeader,bcBody,baseSlide].forEach(l=>{ l.style.opacity=String(lerp(1,0,f)); });
  } else {
    [mcHeader,bcBody,baseSlide].forEach(l=>{ l.style.opacity='0'; });
  }

  if(t>0.08){
    deckContainer.style.opacity='1';
    const dT=Math.min((t-0.08)/0.92,1);
    const fanPeak=0.38, stackEnd=0.72;

    deckCards.forEach((dc,i)=>{
      const delay=i*0.045;
      if(dT>delay){
        dc.style.opacity=String(Math.min((dT-delay)/0.28*3.5,1));
        let rx,ty,tz,rz;
        if(dT<fanPeak){
          const fT=easeOutB(Math.min(dT/fanPeak,1));
          rz=fanAngles[i]*fT; rx=fanX[i]*fT; ty=0; tz=0;
        } else if(dT<stackEnd){
          const sT=easeOut((dT-fanPeak)/(stackEnd-fanPeak));
          rz=fanAngles[i]*(1-sT); rx=fanX[i]*(1-sT);
          tz=cardZ[i]*sT; ty=cardY[i]*sT;
        } else {
          const fT=(dT-stackEnd)/(1-stackEnd);
          const breathe=Math.sin(fT*Math.PI*2.2+i*0.28)*2.2;
          rz=0; rx=0; tz=cardZ[i]; ty=cardY[i]+breathe*(1-i*0.15);
        }
        dc.style.transform=`translateX(${rx}px) translateY(${ty}px) translateZ(${tz}px) rotate(${rz}deg)`;
        dc.style.zIndex=String(i+1);
        if(dT>stackEnd) fireParticles();
      }
    });
  }
}

// ── main rAF loop (Stage1, Stage2) ──
let majorStage=1, cycleCount=0, cycleStart=null, inTrans=false;

function mainLoop(ts){
  if(!cycleStart) cycleStart=ts;
  const el=ts-cycleStart;

  if(el>=STAGE && !inTrans){
    inTrans=true;
    cycleCount++;
    if(majorStage===1){
      if(cycleCount>=REPEAT){
        bcBody.style.display='flex';
        const layers=[mcHeader,bcBody,baseSlide];
        animA(400,easeIO, e=>{
          layers.forEach(l=>{ l.style.opacity=String(1-e); });
        }).then(()=>{
          layers.forEach(l=>{ l.style.transition='none'; });
          bcBody.style.display='none';
          majorStage=2; cycleCount=0;
          resetDeck();
          cycleStart=performance.now(); inTrans=false;
        });
      } else {
        bcBody.style.display='flex'; bcBody.style.opacity='1';
        mcBar.style.width='0%';
        imgFill.style.opacity='0';
        trlEls.forEach(el=>{ el.style.width='0%'; });
        cycleStart=performance.now(); inTrans=false;
      }
    } else {
      resetDeck();
      cycleStart=performance.now(); inTrans=false;
    }
  }

  if(!inTrans){
    const cEl=Math.min(ts-cycleStart,STAGE);
    if(majorStage===1) animStage1(cEl);
    else animStage2(cEl);
  }

  if(document.hidden) setTimeout(()=>mainLoop(performance.now()),16);
  else requestAnimationFrame(mainLoop);
}

// ── kick-off ──
resetAll();
runStage0();
</script>
