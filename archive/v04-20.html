<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>v04-20</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  width:100vw; height:100vh; overflow:hidden;
  background:linear-gradient(158deg,#E8DFFB 0%,#DDE9FB 46%,#D0E7F9 100%);
  display:flex; align-items:center; justify-content:center;
  font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  position:relative;
}

.bg-orb { position:fixed; border-radius:50%; pointer-events:none; }
.orb1 { width:580px;height:580px;background:radial-gradient(circle at 38% 38%,rgba(178,138,255,0.44) 0%,transparent 60%);filter:blur(90px);opacity:0.74;top:-150px;left:-130px;animation:orb1 16s ease-in-out infinite alternate; }
.orb2 { width:480px;height:480px;background:radial-gradient(circle at 55% 55%,rgba(98,195,255,0.40) 0%,transparent 62%);filter:blur(94px);opacity:0.70;bottom:-120px;right:-100px;animation:orb2 20s ease-in-out infinite alternate; }
.orb3 { width:320px;height:320px;background:radial-gradient(circle at 50% 50%,rgba(195,165,255,0.36) 0%,transparent 62%);filter:blur(74px);opacity:0.64;top:36%;left:60%;animation:orb3 13s ease-in-out infinite alternate; }
.orb4 { width:240px;height:240px;background:radial-gradient(circle at 50% 50%,rgba(148,205,255,0.34) 0%,transparent 62%);filter:blur(64px);opacity:0.60;top:8%;right:12%;animation:orb4 9s ease-in-out infinite alternate; }
.orb5 { width:200px;height:200px;background:radial-gradient(circle at 50% 50%,rgba(255,178,198,0.22) 0%,transparent 62%);filter:blur(80px);opacity:0.48;bottom:5%;left:38%;animation:orb5 11s ease-in-out infinite alternate; }
@keyframes orb1{0%{transform:translate(0,0)scale(1)}100%{transform:translate(65px,45px)scale(1.18)}}
@keyframes orb2{0%{transform:translate(0,0)scale(1)}100%{transform:translate(-55px,-38px)scale(1.12)}}
@keyframes orb3{0%{transform:translate(0,0)scale(1)}100%{transform:translate(-42px,32px)scale(0.88)}}
@keyframes orb4{0%{transform:translate(0,0)scale(1)}100%{transform:translate(20px,-25px)scale(1.08)}}
@keyframes orb5{0%{transform:translate(0,0)scale(1)}100%{transform:translate(-30px,20px)scale(1.15)}}

.scene {
  position:relative; width:560px; height:480px;
  display:flex; align-items:center; justify-content:center;
  perspective:1000px; z-index:1;
}

/* ── 슬라이드 배경 ── */
.base-slide {
  position:absolute; width:360px; height:240px;
  background:linear-gradient(155deg,
    rgba(254,252,255,0.93) 0%,
    rgba(248,244,255,0.90) 50%,
    rgba(244,249,255,0.92) 100%
  );
  backdrop-filter:blur(40px) saturate(2.1) brightness(1.04);
  -webkit-backdrop-filter:blur(40px) saturate(2.1) brightness(1.04);
  border-radius:16px;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.99) inset,
    inset 1px 0 0 rgba(255,255,255,0.62),
    inset -1px 0 0 rgba(255,255,255,0.42),
    inset 0 -1px 0 rgba(108,82,198,0.07),
    0 60px 120px rgba(108,82,198,0.18),
    0 24px 56px rgba(92,112,198,0.14),
    0 8px 20px rgba(108,82,198,0.10),
    0 2px 6px rgba(108,82,198,0.08);
  border:1px solid rgba(255,255,255,0.95);
  overflow:hidden;
}
.base-slide::before {
  content:'';
  position:absolute;
  top:-50%; left:-60%; width:60%; height:200%;
  background:linear-gradient(105deg,transparent 0%,rgba(255,255,255,0.12) 50%,transparent 100%);
  animation:glassShimmer 8s ease-in-out infinite;
  pointer-events:none;
}
@keyframes glassShimmer {
  0%   { transform: translateX(0); opacity:0; }
  10%  { opacity:1; }
  40%  { transform: translateX(800px); opacity:0.6; }
  50%  { transform: translateX(900px); opacity:0; }
  100% { transform: translateX(900px); opacity:0; }
}

/* ── MC: 라인 + 꾸밈요소 스타일 (웹 헤더 X) ── */
.mc-header {
  position:absolute;
  width:360px; height:28px;
  top:calc(50% - 120px); left:calc(50% - 180px);
  display:flex; align-items:center;
  padding:0 12px; gap:6px;
  z-index:3;
}
/* 하단 구분선 */
.mc-header::after {
  content:'';
  position:absolute;
  bottom:0; left:10px; right:10px; height:1px;
  background:linear-gradient(90deg,
    transparent,
    rgba(148,108,228,0.25) 20%,
    rgba(148,108,228,0.35) 50%,
    rgba(148,108,228,0.25) 80%,
    transparent
  );
}
/* 꾸밈 다이아몬드 */
.mc-gem {
  width:5px; height:5px;
  background:rgba(138,105,218,0.50);
  transform:rotate(45deg);
  flex-shrink:0;
  box-shadow:0 0 4px rgba(138,105,218,0.30);
}
.mc-bar {
  flex:1; height:4px; border-radius:2px;
  background:linear-gradient(90deg,rgba(122,82,215,0.55),rgba(82,132,228,0.42));
  width:0%; position:relative; overflow:hidden;
  box-shadow:0 0 0 0 rgba(122,82,215,0);
  transition:box-shadow 0.3s ease;
}
.mc-bar.filled {
  box-shadow:0 0 5px 1px rgba(122,82,215,0.28), 0 0 10px 2px rgba(82,132,228,0.14);
  animation:barPulse 2.8s ease-in-out infinite;
}
@keyframes barPulse {
  0%   { box-shadow:0 0 3px 1px rgba(122,82,215,0.20), 0 0 6px 1px rgba(82,132,228,0.10); }
  50%  { box-shadow:0 0 7px 2px rgba(122,82,215,0.32), 0 0 14px 3px rgba(82,132,228,0.18); }
  100% { box-shadow:0 0 3px 1px rgba(122,82,215,0.20), 0 0 6px 1px rgba(82,132,228,0.10); }
}
.mc-bar::after {
  content:''; position:absolute; top:0;right:0;bottom:0;width:16px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.65));
  border-radius:0 2px 2px 0;
}
.mc-bar::before {
  content:''; position:absolute;
  top:0; left:-50%; bottom:0; width:50%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.40),transparent);
  animation:mcBarShimmer 3.0s ease-in-out infinite;
}
@keyframes mcBarShimmer{0%{left:-50%}100%{left:130%}}
/* 우측 꾸밈 도트 3개 */
.mc-dots {
  display:flex; gap:3px; flex-shrink:0;
}
.mc-dots span {
  width:3px; height:3px; border-radius:50%;
  background:rgba(138,105,218,0.32);
}
.mc-dots span:nth-child(2){ background:rgba(138,105,218,0.22); }
.mc-dots span:nth-child(3){ background:rgba(138,105,218,0.14); }

/* ── BC: MC 아래 body 영역 ── */
.bc-body {
  position:absolute;
  width:360px; height:196px;
  top:calc(50% - 120px + 28px); left:calc(50% - 180px);
  border-radius:0 0 16px 16px;
  overflow:hidden;
  display:none;
  z-index:3;
  box-shadow:inset 0 3px 8px rgba(148,108,228,0.06);
}

.bc-text {
  flex:1; padding:16px 14px 14px 16px;
  display:flex; flex-direction:column; gap:7px;
  background:
    radial-gradient(circle, rgba(148,108,228,0.055) 1px, transparent 1px),
    linear-gradient(160deg, rgba(250,246,255,0.97) 0%, rgba(240,233,255,0.93) 100%);
  background-size: 14px 14px, 100% 100%;
  position:relative;
}
.bc-text::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, rgba(255,255,255,0.0), rgba(255,255,255,0.88), rgba(255,255,255,0.0));
}
.bc-text::after {
  content:'';
  position:absolute;
  bottom:0; left:0; right:0; height:32px;
  background:linear-gradient(0deg, rgba(240,233,255,0.75), transparent);
  pointer-events:none;
}

.trl {
  height:5px; border-radius:3px;
  background:linear-gradient(90deg, rgba(118,82,210,0.28), rgba(98,118,210,0.18));
  width:0%; position:relative; overflow:hidden;
  flex-shrink:0;
}
#trl0 { height:6px; background:linear-gradient(90deg, rgba(108,68,205,0.42), rgba(82,122,218,0.28)); }
#trl1 { background:linear-gradient(90deg, rgba(118,82,210,0.30), rgba(98,118,210,0.20)); }
#trl4 { height:4px; background:linear-gradient(90deg, rgba(118,82,210,0.18), rgba(98,118,210,0.10)); }
.trl::after {
  content:''; position:absolute; top:0;left:-60%;bottom:0;width:60%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.75),transparent);
  animation:shimmer 2.6s ease-in-out infinite;
}
#trl0::after { animation-delay: 0s; }
#trl1::after { animation-delay: 0.18s; }
#trl2::after { animation-delay: 0.36s; }
#trl3::after { animation-delay: 0.54s; }
#trl4::after { animation-delay: 0.72s; }
@keyframes shimmer{0%{left:-60%}100%{left:110%}}

.bc-image {
  width:116px; flex-shrink:0;
  background:linear-gradient(145deg,
    rgba(138,195,255,0.68) 0%,
    rgba(108,175,252,0.75) 30%,
    rgba(128,155,245,0.68) 65%,
    rgba(155,145,248,0.62) 100%
  );
  background-size:200% 200%;
  animation:imgBgAnim 6s ease-in-out infinite;
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
}
@keyframes imgBgAnim {
  0%   { background-position: 0% 0%; }
  50%  { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}
.bc-image::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0; height:45%;
  background:linear-gradient(180deg, rgba(255,255,255,0.26) 0%, transparent 100%);
  pointer-events:none; z-index:1;
}
.bc-image::after {
  content:'';
  position:absolute;
  top:8px; bottom:8px; left:0; width:1px;
  background:linear-gradient(180deg,transparent,rgba(255,255,255,0.60) 30%,rgba(255,255,255,0.60) 70%,transparent);
  z-index:2;
}

.img-fill {
  width:78%; height:70%;
  background:linear-gradient(135deg,rgba(200,230,255,0.55) 0%,rgba(168,210,255,0.68) 50%,rgba(185,220,255,0.55) 100%);
  background-size:200% 200%;
  animation:imgAnim 3.5s ease-in-out infinite;
  display:flex; align-items:center; justify-content:center;
  opacity:0; border-radius:8px;
  border:1px solid rgba(255,255,255,0.68);
  box-shadow:0 3px 10px rgba(82,128,228,0.22),0 1px 0 rgba(255,255,255,0.80) inset,inset 0 -1px 0 rgba(82,128,228,0.10);
  z-index:2;
}
@keyframes imgAnim{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.img-fill::after {
  content:'';
  position:absolute;
  top:0; left:-70%; width:70%; bottom:0;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,0.28),transparent);
  animation:imgShimmer 4.2s ease-in-out infinite;
  border-radius:8px; pointer-events:none;
}
@keyframes imgShimmer{0%{left:-70%;opacity:0}15%{opacity:1}55%{left:110%;opacity:0.7}60%{left:110%;opacity:0}100%{left:110%;opacity:0}}
.img-icon {
  width:26px;height:20px;
  border:1.5px solid rgba(255,255,255,0.65);
  border-radius:4px;position:relative;
  background:rgba(255,255,255,0.28);
  box-shadow:0 1px 4px rgba(82,128,228,0.18);
}
.img-icon::before {
  content:'';position:absolute;top:3px;left:3px;width:6px;height:6px;
  border-radius:50%;background:rgba(255,255,255,0.72);
}
.img-icon::after {
  content:'';position:absolute;bottom:0;left:0;right:0;height:9px;
  background:linear-gradient(135deg,rgba(168,215,255,0.60),rgba(138,188,245,0.70));
  border-radius:0 0 3px 3px;
}

/* ── 덱 ── */
.deck-container {
  position:absolute; width:360px; height:240px;
  left:calc(50% - 180px); top:calc(50% - 138px);
  transform-style:preserve-3d; opacity:0;
}
.deck-card {
  position:absolute; width:360px; height:240px;
  background:linear-gradient(150deg,rgba(252,249,255,0.95),rgba(244,238,255,0.92));
  backdrop-filter:blur(36px) saturate(2.0) brightness(1.02);
  -webkit-backdrop-filter:blur(36px) saturate(2.0) brightness(1.02);
  border-radius:14px; border:1px solid rgba(255,255,255,0.88);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.98) inset,
    0 12px 32px rgba(108,82,198,0.10),
    0 6px 14px rgba(92,112,198,0.07),
    0 2px 4px rgba(108,82,198,0.04),
    inset 0 -1px 0 rgba(108,82,198,0.04),
    inset 1px 0 0 rgba(255,255,255,0.55),
    inset -1px 0 0 rgba(255,255,255,0.35);
  overflow:hidden; opacity:0;
  transform:translateZ(0px) translateY(0px);
  backface-visibility:hidden;
  transform-origin:bottom center;
}
/* 덱 카드 MC 라인 영역 */
.deck-card::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.90) 30%,rgba(255,255,255,0.90) 70%,transparent);
}
.dc-body { padding:18px 20px; width:100%; height:100%; display:flex; flex-direction:column; }
.dc-hbar {
  height:8px;border-radius:5px;
  background:linear-gradient(90deg,rgba(118,72,210,0.55),rgba(72,132,228,0.44));
  margin-bottom:14px;width:58%;flex-shrink:0;
  box-shadow:0 1px 0 rgba(255,255,255,0.70) inset;
}
.dc-line {
  height:5px;border-radius:3px;
  background:linear-gradient(90deg,rgba(118,88,210,0.22),rgba(98,108,210,0.14));
  margin-bottom:8px;flex-shrink:0;
}
.dc-img {
  flex:1;border-radius:10px;
  background:linear-gradient(148deg,rgba(195,172,255,0.50),rgba(155,205,255,0.44));
  box-shadow:0 1px 0 rgba(255,255,255,0.95) inset,0 2px 6px rgba(118,88,210,0.10);
  margin-top:4px;
}
.dc-two { flex:1;display:flex;gap:12px;margin-top:4px; }
.dc-col {
  flex:1;border-radius:8px;
  background:linear-gradient(150deg,rgba(128,95,215,0.16),rgba(108,125,215,0.10));
  box-shadow:0 1px 0 rgba(255,255,255,0.90) inset;
}

/* ── 파티클 ── */
.particle-container { position:absolute;width:100%;height:100%;pointer-events:none;overflow:hidden;border-radius:14px; }

/* ── 썸네일 갤러리 (Stage 0용) ── */
.thumb-gallery {
  position:absolute;
  display:flex; gap:10px; align-items:flex-end;
  opacity:0;
  z-index:20;
  /* 메인 슬라이드 아래 중앙 */
  left:calc(50% - 180px);
  top:calc(50% + 132px);
}
.thumb {
  width:84px; height:56px;
  border-radius:7px;
  background:rgba(248,244,255,0.96);
  border:1px solid rgba(255,255,255,0.92);
  box-shadow:0 6px 18px rgba(108,82,198,0.14),0 2px 6px rgba(108,82,198,0.08),0 1px 0 rgba(255,255,255,0.98) inset;
  overflow:hidden;
  position:relative;
  flex-shrink:0;
  transition:opacity 0.3s ease, box-shadow 0.3s ease;
  /* 비활성 상태 */
  opacity:0.35;
}
.thumb.active {
  opacity:1;
  box-shadow:0 0 0 2px rgba(128,88,218,0.55), 0 0 12px rgba(128,88,218,0.20), 0 6px 18px rgba(108,82,198,0.18),0 2px 6px rgba(108,82,198,0.10),0 1px 0 rgba(255,255,255,0.98) inset;
}
/* 썸네일 MC 영역 (상단 얇은 라인) */
.thumb-mc {
  position:absolute; top:0; left:0; right:0; height:10px;
  background:linear-gradient(135deg,rgba(222,210,255,0.85),rgba(205,222,255,0.75));
  display:flex; align-items:center; padding:0 5px; gap:3px;
}
.thumb-mc::after {
  content:'';
  position:absolute;
  bottom:0; left:4px; right:4px; height:1px;
  background:linear-gradient(90deg,transparent,rgba(148,108,228,0.30) 30%,rgba(148,108,228,0.30) 70%,transparent);
}
.thumb-mc-gem {
  width:3px; height:3px;
  background:rgba(138,105,218,0.48);
  transform:rotate(45deg);
  flex-shrink:0;
}
.thumb-mc-bar {
  flex:1; height:2px; border-radius:1px;
  background:linear-gradient(90deg,rgba(122,82,215,0.50),rgba(82,132,228,0.36));
}
/* 썸네일 BC 영역 */
.thumb-bc {
  position:absolute; top:10px; left:0; right:0; bottom:0;
  display:flex;
}
.thumb-bc-text {
  flex:1; padding:5px 5px 4px 5px;
  display:flex; flex-direction:column; gap:2.5px;
  background:linear-gradient(160deg, rgba(250,246,255,0.97) 0%, rgba(240,233,255,0.90) 100%);
}
.thumb-bc-line {
  height:2px; border-radius:1px;
  background:linear-gradient(90deg,rgba(118,82,210,0.28),rgba(98,118,210,0.16));
}
.thumb-bc-line:first-child { height:2.5px; background:linear-gradient(90deg,rgba(108,68,205,0.40),rgba(82,122,218,0.26)); width:85%; }
.thumb-bc-line:nth-child(2) { width:70%; }
.thumb-bc-line:nth-child(3) { width:90%; }
.thumb-bc-line:nth-child(4) { width:55%; }
.thumb-bc-img {
  width:28px; flex-shrink:0;
  background:linear-gradient(145deg,rgba(138,195,255,0.70),rgba(128,155,245,0.65));
  position:relative;
}
.thumb-bc-img::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0; height:40%;
  background:linear-gradient(180deg,rgba(255,255,255,0.24),transparent);
}
</style>
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>
<div class="bg-orb orb4"></div>
<div class="bg-orb orb5"></div>

<div class="scene" id="scene">
  <!-- 슬라이드 배경 -->
  <div class="base-slide" id="baseSlide"></div>

  <!-- MC: 라인 + 꾸밈요소 -->
  <div class="mc-header" id="mcHeader">
    <div class="mc-gem"></div>
    <div class="mc-bar" id="mcBar"></div>
    <div class="mc-dots"><span></span><span></span><span></span></div>
  </div>

  <!-- BC: 썸네일에서 날아와 MC 아래 착지 -->
  <div class="bc-body" id="bcBody" style="display:flex;">
    <div class="bc-text" id="bcText">
      <div class="trl" id="trl0"></div>
      <div class="trl" id="trl1"></div>
      <div class="trl" id="trl2"></div>
      <div class="trl" id="trl3"></div>
      <div class="trl" id="trl4" style="height:4px"></div>
    </div>
    <div class="bc-image" id="bcImage">
      <div class="img-fill" id="imgFill"><div class="img-icon"></div></div>
    </div>
  </div>

  <!-- 썸네일 갤러리 -->
  <div class="thumb-gallery" id="thumbGallery">
    <!-- thumb0 ~ thumb4: JS로 생성 -->
  </div>

  <!-- 덱 -->
  <div class="deck-container" id="deckContainer">
    <div class="deck-card" id="dc0">
      <div class="dc-body">
        <div class="dc-hbar" style="background:linear-gradient(90deg,rgba(108,62,215,0.58),rgba(62,128,228,0.46));width:55%"></div>
        <div class="dc-line" style="width:82%"></div>
        <div class="dc-line" style="width:68%"></div>
        <div class="dc-line" style="width:74%"></div>
        <div class="dc-img" style="background:linear-gradient(148deg,rgba(185,158,255,0.52),rgba(148,205,255,0.46))"></div>
      </div>
    </div>
    <div class="deck-card" id="dc1">
      <div class="dc-body">
        <div class="dc-hbar" style="background:linear-gradient(90deg,rgba(62,148,228,0.55),rgba(62,208,198,0.44));width:50%"></div>
        <div class="dc-two">
          <div class="dc-col" style="background:linear-gradient(150deg,rgba(112,178,248,0.22),rgba(88,208,218,0.14))"></div>
          <div class="dc-col" style="background:linear-gradient(150deg,rgba(88,148,238,0.20),rgba(72,188,208,0.12))"></div>
        </div>
      </div>
    </div>
    <div class="deck-card" id="dc2">
      <div class="dc-body">
        <div class="dc-hbar" style="background:linear-gradient(90deg,rgba(148,88,228,0.52),rgba(198,88,198,0.40));width:62%"></div>
        <div class="dc-line" style="width:90%"></div>
        <div class="dc-line" style="width:76%"></div>
        <div class="dc-line" style="width:84%"></div>
        <div class="dc-line" style="width:64%"></div>
        <div class="dc-line" style="width:78%"></div>
      </div>
    </div>
    <div class="deck-card" id="dc3">
      <div class="dc-body">
        <div class="dc-img" style="flex:0.52;background:linear-gradient(135deg,rgba(168,212,255,0.55),rgba(138,185,255,0.48),rgba(178,162,255,0.44))"></div>
        <div style="margin-top:12px">
          <div class="dc-hbar" style="background:linear-gradient(90deg,rgba(88,158,245,0.52),rgba(118,108,228,0.40));width:48%"></div>
          <div class="dc-line" style="width:70%"></div>
          <div class="dc-line" style="width:58%"></div>
        </div>
      </div>
    </div>
    <div class="deck-card" id="dc4">
      <div class="dc-body">
        <div class="dc-hbar" style="background:linear-gradient(90deg,rgba(118,72,210,0.56),rgba(72,132,228,0.45));width:60%"></div>
        <div style="flex:1;display:flex;gap:12px;margin-top:6px;">
          <div style="flex:1;display:flex;flex-direction:column;gap:7px;padding-top:1px;">
            <div class="dc-line" style="width:88%"></div>
            <div class="dc-line" style="width:72%"></div>
            <div class="dc-line" style="width:92%"></div>
            <div class="dc-line" style="width:64%"></div>
            <div class="dc-line" style="width:78%;height:4px;"></div>
          </div>
          <div style="width:90px;flex-shrink:0;border-radius:9px;
            background:linear-gradient(148deg,rgba(138,195,255,0.56),rgba(168,158,255,0.44));
            box-shadow:0 1px 0 rgba(255,255,255,0.92) inset, 0 2px 8px rgba(88,128,228,0.14);
            position:relative;overflow:hidden;">
            <div style="position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(180deg,rgba(255,255,255,0.22),transparent)"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="particle-container" id="particleContainer"></div>
</div>

<script>
const STAGE = 7000;
const REPEAT = 3;

// DOM
const scene         = document.getElementById('scene');
const baseSlide     = document.getElementById('baseSlide');
const mcHeader      = document.getElementById('mcHeader');
const mcBar         = document.getElementById('mcBar');
const bcBody        = document.getElementById('bcBody');
const bcText        = document.getElementById('bcText');
const bcImage       = document.getElementById('bcImage');
const imgFill       = document.getElementById('imgFill');
const trlEls        = [0,1,2,3,4].map(i=>document.getElementById('trl'+i));
const deckContainer = document.getElementById('deckContainer');
const deckCards     = [0,1,2,3,4].map(i=>document.getElementById('dc'+i));
const particleCont  = document.getElementById('particleContainer');
const thumbGallery  = document.getElementById('thumbGallery');

// easing
const easeOut    = t => 1-Math.pow(1-t,3);
const easeOut4   = t => 1-Math.pow(1-t,4);
const easeOutExp = t => t===0 ? 0 : 1-Math.pow(2,-10*t);
const easeInExp  = t => t===1 ? 1 : 1-Math.pow(2,-10*t);
const easeOutB2  = t => { const c=2.5*1.5; return 1+c*Math.pow(t-1,3)+(c-1)*Math.pow(t-1,2); };
const easeIO     = t => t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
const lerp       = (a,b,t) => a+(b-a)*t;

// async utils
const raf2   = fn => setTimeout(()=>fn(performance.now()),16);
const waitMs = ms => new Promise(r=>setTimeout(r,ms));
function animA(dur,ease,cb){
  return new Promise(res=>{
    const s=performance.now();
    function f(n){ const t=Math.min((n-s)/dur,1); cb(ease(t),t); if(t<1)raf2(f); else res(); }
    raf2(f);
  });
}

// particle
let particleFired=false, particleStyleOk=false;
function fireParticles(){
  if(particleFired)return; particleFired=true;
  if(!particleStyleOk){
    particleStyleOk=true;
    const s=document.createElement('style');
    s.textContent=`
      @keyframes pA{0%{transform:translate(-50%,-50%) translate(0,0) scale(1);opacity:.95}100%{transform:translate(-50%,-50%) translate(var(--px),var(--py)) scale(0);opacity:0}}
      @keyframes pB{0%{transform:translate(-50%,-50%) translate(0,0) scale(1) rotate(0deg);opacity:.90}100%{transform:translate(-50%,-50%) translate(var(--px),var(--py)) scale(0) rotate(180deg);opacity:0}}
    `;
    document.head.appendChild(s);
  }
  particleCont.innerHTML='';
  const cols=['#b892e8','#8ac3f0','#dab8f8','#72ccde','#d0a8f8','#68d8a8','#f0b8d8','#a8e8d0'];
  for(let i=0;i<28;i++){
    const p=document.createElement('div');
    const a=(i/28)*Math.PI*2+(Math.random()-0.5)*0.4;
    const d=48+Math.random()*68;
    const col=cols[Math.floor(Math.random()*cols.length)];
    const sz=2+Math.random()*6;
    const isSquare=Math.random()<0.25;
    const dur=0.65+Math.random()*0.55;
    const delay=Math.random()*0.20;
    const anim=isSquare?'pB':'pA';
    p.style.cssText=`position:absolute;left:50%;top:50%;width:${sz}px;height:${sz}px;
      border-radius:${isSquare?'2px':'50%'};
      background:${col};opacity:0;
      animation:${anim} ${dur}s ${delay}s ease-out forwards;
      --px:${Math.cos(a)*d}px;--py:${Math.sin(a)*d}px`;
    particleCont.appendChild(p);
  }
}

// ── 썸네일 생성 ──
// 각 썸네일마다 BC 텍스트 라인 길이 살짝 다르게 (개성)
const thumbLineWidths = [
  [85,68,90,52], // thumb0
  [75,82,60,88], // thumb1
  [90,55,78,65], // thumb2
  [70,88,50,80], // thumb3
  [88,72,92,62], // thumb4 — 메인 BC와 동일 계열
];
let thumbEls = [];

function buildThumbs(){
  thumbGallery.innerHTML='';
  thumbEls=[];
  for(let i=0;i<5;i++){
    const th=document.createElement('div');
    th.className='thumb';
    th.id='thumb'+i;
    const lw=thumbLineWidths[i];
    th.innerHTML=`
      <div class="thumb-mc">
        <div class="thumb-mc-gem"></div>
        <div class="thumb-mc-bar"></div>
      </div>
      <div class="thumb-bc">
        <div class="thumb-bc-text">
          <div class="thumb-bc-line" style="width:${lw[0]}%"></div>
          <div class="thumb-bc-line" style="width:${lw[1]}%"></div>
          <div class="thumb-bc-line" style="width:${lw[2]}%"></div>
          <div class="thumb-bc-line" style="width:${lw[3]}%"></div>
        </div>
        <div class="thumb-bc-img"></div>
      </div>
    `;
    thumbGallery.appendChild(th);
    thumbEls.push(th);
  }
}

// ── reset ──
function resetMC(){
  mcHeader.style.opacity='1';
  mcBar.style.width='0%';
  mcBar.classList.remove('filled');
}
function resetBC(){
  bcBody.style.display='none';
  bcBody.style.opacity='';
  bcBody.style.transform='';
  bcBody.style.transition='none';
  imgFill.style.opacity='0';
  trlEls.forEach(el=>{ el.style.width='0%'; });
}
function resetDeck(){
  deckContainer.style.opacity='0';
  deckCards.forEach((dc,i)=>{
    dc.style.opacity='0';
    dc.style.transform='translateZ(0) translateY(0) rotate(0deg)';
    dc.style.zIndex=String(i+1);
  });
  particleFired=false;
  particleCont.innerHTML='';
}
function resetAll(){
  baseSlide.style.opacity='1';
  resetMC();
  resetBC();
  resetDeck();
}

// ── Stage 0: 썸네일 갤러리 → 순서대로 활성화 → 마지막 BC 뜯기 ──
async function stage0Seq(){
  buildThumbs();

  // MC bar 채우기
  await animA(480,easeOutExp, e=>{ mcBar.style.width=(e*100)+'%'; });
  mcBar.classList.add('filled');
  await waitMs(200);

  // 갤러리 fade-in
  await animA(320,easeOut, e=>{
    thumbGallery.style.opacity=String(e);
  });
  await waitMs(160);

  // 썸네일 순서대로 활성화 (각 240ms 간격)
  for(let i=0;i<5;i++){
    // 이전 것 비활성
    if(i>0) thumbEls[i-1].classList.remove('active');
    thumbEls[i].classList.add('active');
    await waitMs(i<4 ? 240 : 360); // 마지막은 조금 더 대기
  }

  // 마지막 썸네일(thumb4) BC 영역 위치 계산
  // thumbGallery left = scene.left + (560-180*2)/2 = scene의 상대 위치
  // scene은 560×480 중앙 fixed
  // thumbGallery: left=calc(50%-180px) = scene 내 100px, top=calc(50%+132px) = 240+132=372px
  // thumb4 위치: 100 + (84+10)*4 = 100 + 376 = 476px (left), top=372px
  // BC 영역: thumb 내에서 top:10px, height:46px, left:0, right:0
  // 즉 BC 영역 절대좌표(scene 기준): x=476, y=382(=372+10), w=84, h=46

  const THUMB_W=84, THUMB_H=56, THUMB_BC_TOP=10;
  const GAP=10;
  const galleryLeft=100; // calc(50%-180px) with scene 560px wide
  const galleryTop=372;  // calc(50%+132px) with scene 480px high (480/2=240, +132=372)
  const thumb4Left = galleryLeft + (THUMB_W+GAP)*4;
  const thumb4Top  = galleryTop;
  const srcBCx = thumb4Left;
  const srcBCy = thumb4Top + THUMB_BC_TOP;
  const srcBCw = THUMB_W;
  const srcBCh = THUMB_H - THUMB_BC_TOP; // 46px

  // 메인 BC 착지 목표 (MC header 28px 아래)
  // base-slide: left=100, top=120(=240/2-120). BC top=120+28=148
  const BCW=360, BCH=196;
  const tX=100, tY=148;
  const sc0=srcBCw/BCW; // 84/360 ≈ 0.233

  // BC body 초기 위치: BC 중심을 썸네일 BC 중심에 맞춤
  const initX = srcBCx - (BCW-srcBCw)/2;
  const initY = srcBCy - (BCH-srcBCh)/2;

  bcBody.style.display='flex';
  bcBody.style.position='absolute';
  bcBody.style.left='0'; bcBody.style.top='0';
  bcBody.style.width=BCW+'px'; bcBody.style.height=BCH+'px';
  bcBody.style.opacity='0';
  bcBody.style.transformOrigin='center center';
  bcBody.style.transform=`translate(${initX}px,${initY}px) scale(${sc0}) rotate(1.5deg)`;
  bcBody.style.transition='none';
  bcBody.style.zIndex='10';

  const sx=initX, sy=initY;

  // thumb4 highlight 펄스
  thumbEls[4].style.transition='box-shadow 0.15s ease, transform 0.15s ease';
  thumbEls[4].style.boxShadow='0 0 0 2.5px rgba(128,88,218,0.65), 0 0 18px rgba(128,88,218,0.30), 0 6px 18px rgba(108,82,198,0.22)';
  thumbEls[4].style.transform='scale(1.06)';
  await waitMs(180);
  thumbEls[4].style.boxShadow='';
  thumbEls[4].style.transform='scale(1)';
  thumbEls[4].style.transition='none';
  await waitMs(100);

  // 썸네일 BC 영역만 남기고 갤러리 페이드 아웃 (thumb4 BC가 날아오는 동안)
  animA(300,easeOut, e=>{
    thumbGallery.style.opacity=String(1-e);
  });

  // BC fly — expo out + 아크 경로
  await animA(680,easeOutExp,(e,t)=>{
    const x=lerp(sx,tX,e);
    const rawY=lerp(sy,tY,e);
    const arc=-Math.sin(Math.PI*Math.pow(t,0.7))*34;
    const y=rawY+arc;
    const sc=lerp(sc0,1,1-Math.pow(1-e,4));
    const rz=lerp(1.5,0,easeOutExp(e));
    bcBody.style.transform=`translate(${x}px,${y}px) scale(${sc}) rotate(${rz}deg)`;
    bcBody.style.opacity=String(Math.min(e*2.2,1));
  });

  // 착지 squash-and-stretch
  await animA(110,t=>Math.sin(t*Math.PI),e=>{
    bcBody.style.transform=`translate(${tX}px,${tY+e*3}px) scaleX(${1+e*0.028}) scaleY(${1-e*0.020}) rotate(0deg)`;
  });
  await animA(150,t=>Math.sin(t*Math.PI),e=>{
    bcBody.style.transform=`translate(${tX}px,${tY-e*4}px) scaleX(${1-e*0.014}) scaleY(${1+e*0.016}) rotate(0deg)`;
  });
  await animA(85,t=>Math.sin(t*Math.PI)*0.5,e=>{
    bcBody.style.transform=`translate(${tX}px,${tY+e*1.2}px) scale(${1+e*0.003}) rotate(0deg)`;
  });
  bcBody.style.transform=`translate(${tX}px,${tY}px) scale(1) rotate(0deg)`;

  // 착지 glow flash
  bcBody.style.boxShadow='0 0 0 3px rgba(148,98,238,0.50), 0 0 22px rgba(128,82,218,0.26)';
  await waitMs(55);
  bcBody.style.transition='box-shadow 0.60s cubic-bezier(0.16,1,0.3,1)';
  bcBody.style.boxShadow='0 0 0 0px rgba(148,98,238,0), 0 4px 16px rgba(118,72,198,0.10)';
  await waitMs(180);
  bcBody.style.transition='none';

  thumbGallery.style.opacity='0';

  // inline style 복원 — MC 28px 아래 정착
  bcBody.style.cssText='display:flex;opacity:1;transform:none;position:absolute;left:calc(50% - 180px);top:calc(50% - 92px);width:360px;height:196px';

  await waitMs(2200);
}

async function runStage0(){
  for(let i=0;i<REPEAT;i++){
    resetAll();
    thumbGallery.style.opacity='0';
    await stage0Seq();
    if(i<REPEAT-1){
      await new Promise(res=>{
        bcBody.style.transition='opacity 0.4s ease';
        bcBody.style.opacity='0';
        setTimeout(()=>{ bcBody.style.transition='none'; bcBody.style.display='none'; res(); },420);
      });
    }
    if(i===REPEAT-1) break;
    resetBC();
  }
  startStage1();
}

// ── Stage 1: MC+BC 콘텐츠 reveal ──
function startStage1(){
  majorStage=1; cycleCount=0;
  bcBody.style.cssText='display:flex;opacity:1;transform:none;position:absolute;left:calc(50% - 180px);top:calc(50% - 92px);width:360px;height:196px';
  mcBar.style.width='0%';
  imgFill.style.opacity='0';
  trlEls.forEach(el=>{ el.style.width='0%'; });
  cycleStart=performance.now();
  raf2(mainLoop);
}

function animStage1(el){
  const t=el/STAGE;
  baseSlide.style.opacity='1';
  mcHeader.style.opacity='1';
  bcBody.style.display='flex'; bcBody.style.opacity='1'; bcBody.style.transform='none';
  mcBar.style.width=easeOutExp(Math.min(Math.max(t-0.03,0)/0.14,1))*100+'%';
  if(t>0.14) imgFill.style.opacity=String(1-Math.pow(1-Math.min((t-0.14)/0.20,1),4));
  const d=[0.05,0.13,0.22,0.32,0.43], w=[88,72,92,62,78];
  trlEls.forEach((el,i)=>{ if(t>d[i]) el.style.width=easeOutExp(Math.min((t-d[i])/0.17,1))*w[i]+'%'; });
}

// ── Stage 2: deck fan-out ──
const fanAngles=[-26,-13,0,13,26];
const fanX=[-52,-26,0,26,52];
const cardZ=[-64,-48,-32,-16,0];
const cardY=[-20,-15,-10,-5,0];

function animStage2(el){
  const t=el/STAGE;
  if(t<0.18){
    const f=easeOut(Math.min(t/0.18,1));
    [mcHeader,bcBody].forEach(l=>{ l.style.opacity=String(lerp(1,0,f)); });
    baseSlide.style.opacity=String(lerp(1,0,Math.min(t/0.25,1)));
  } else {
    [mcHeader,bcBody].forEach(l=>{ l.style.opacity='0'; });
    if(t<0.25) baseSlide.style.opacity=String(lerp(1,0,easeOut(t/0.25)));
    else baseSlide.style.opacity='0';
  }

  if(t>0.10){
    deckContainer.style.opacity='1';
    const dT=Math.min((t-0.08)/0.92,1);
    const fanPeak=0.38, stackEnd=0.72;

    deckCards.forEach((dc,i)=>{
      const delay=i*0.045;
      if(dT>delay){
        dc.style.opacity=String(Math.min((dT-delay)/0.28*3.5,1));
        let rx,ty,tz,rz;
        if(dT<fanPeak){
          const fT=easeOutB2(Math.min(dT/fanPeak,1));
          rz=fanAngles[i]*fT; rx=fanX[i]*fT; ty=0; tz=0;
        } else if(dT<stackEnd){
          const sT=easeOutExp((dT-fanPeak)/(stackEnd-fanPeak));
          rz=fanAngles[i]*(1-sT); rx=fanX[i]*(1-sT);
          tz=cardZ[i]*sT; ty=cardY[i]*sT;
        } else {
          const fT=(dT-stackEnd)/(1-stackEnd);
          const breathe=Math.sin(fT*Math.PI*2.2+i*0.28)*2.2;
          rz=0; rx=0; tz=cardZ[i]; ty=cardY[i]+breathe*(1-i*0.15);
          if(i===4){
            const shadowDepth=0.5+0.5*(breathe/2.2+1)/2;
            dc.style.boxShadow=`
              0 1px 0 rgba(255,255,255,0.98) inset,
              0 ${12+shadowDepth*8}px ${28+shadowDepth*12}px rgba(108,82,198,${0.09+shadowDepth*0.05}),
              0 ${6+shadowDepth*4}px ${14+shadowDepth*6}px rgba(92,112,198,${0.06+shadowDepth*0.03}),
              inset 1px 0 0 rgba(255,255,255,0.55)
            `;
          }
        }
        dc.style.transform=`translateX(${rx}px) translateY(${ty}px) translateZ(${tz}px) rotate(${rz}deg)`;
        dc.style.zIndex=String(i+1);
        if(dT>stackEnd) fireParticles();
      }
    });
  }
}

// ── main rAF loop ──
let majorStage=1, cycleCount=0, cycleStart=null, inTrans=false;

function mainLoop(ts){
  if(!cycleStart) cycleStart=ts;
  const el=ts-cycleStart;

  if(el>=STAGE && !inTrans){
    inTrans=true;
    cycleCount++;
    if(majorStage===1){
      if(cycleCount>=REPEAT){
        bcBody.style.display='flex';
        const layers=[mcHeader,bcBody,baseSlide];
        animA(400,easeIO, e=>{
          layers.forEach(l=>{ l.style.opacity=String(1-e); });
        }).then(()=>{
          layers.forEach(l=>{ l.style.transition='none'; });
          bcBody.style.display='none';
          majorStage=2; cycleCount=0;
          resetDeck();
          cycleStart=performance.now(); inTrans=false;
        });
      } else {
        bcBody.style.display='flex'; bcBody.style.opacity='1';
        mcBar.style.width='0%';
        imgFill.style.opacity='0';
        trlEls.forEach(el=>{ el.style.width='0%'; });
        cycleStart=performance.now(); inTrans=false;
      }
    } else {
      resetDeck();
      cycleStart=performance.now(); inTrans=false;
    }
  }

  if(!inTrans){
    const cEl=Math.min(ts-cycleStart,STAGE);
    if(majorStage===1) animStage1(cEl);
    else animStage2(cEl);
  }

  if(document.hidden) setTimeout(()=>mainLoop(performance.now()),16);
  else requestAnimationFrame(mainLoop);
}

// ── kick-off ──
resetAll();
runStage0();
</script>
</body>
