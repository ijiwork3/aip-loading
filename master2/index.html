<style>
* { margin:0; padding:0; box-sizing:border-box; }

/* ── 라이트/다크 토글 버튼 ── */
#themeToggle {
  position:fixed; top:20px; left:20px; z-index:200;
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,0.72); backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.90);
  border-radius:40px; padding:7px 14px;
  box-shadow:0 4px 16px rgba(108,82,198,0.10);
  cursor:pointer; font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  font-size:12px; font-weight:600; color:rgba(60,50,100,0.70);
  transition:background 0.3s, color 0.3s, border-color 0.3s;
  user-select:none;
}
#themeToggle .toggle-icon { font-size:14px; line-height:1; }

/* 다크모드 토글 버튼 */
body.dark #themeToggle {
  background:rgba(30,24,50,0.80);
  border-color:rgba(255,255,255,0.10);
  color:rgba(200,190,230,0.80);
  box-shadow:0 4px 16px rgba(0,0,0,0.30);
}

/* ── 다크모드 전체 ── */
body.dark {
  background:url('BG-dark.png') center center / cover no-repeat, #1a1628;
}

/* 다크: 타이틀/서브 */
body.dark .stage-title { color:#E8E4F4; }
body.dark .stage-sub   { color:rgba(200,192,228,0.70); }

/* 다크: base-slide */
body.dark .base-slide {
  background:linear-gradient(155deg,rgba(36,28,58,0.92) 0%,rgba(30,24,52,0.90) 50%,rgba(28,32,54,0.92) 100%);

  box-shadow:
    inset 0 0 12px 2px rgba(60,44,88,0.65),

/* 다크: bc-text */
body.dark .bc-text { background:rgba(28,22,50,0.95); }

/* 다크: bc-image */
body.dark .bc-image {

body.dark .img-fill {

/* 다크: deck-card */

body.dark .dc-hbar { box-shadow:none; }
body.dark .dc-line { background:linear-gradient(90deg,rgba(148,118,238,0.24),rgba(118,138,238,0.15)); }
body.dark .dc-img  { background:linear-gradient(148deg,rgba(80,55,168,0.50),rgba(60,90,178,0.44)); box-shadow:0 1px 0 rgba(255,255,255,0.06) inset; }
body.dark .dc-col  { background:linear-gradient(150deg,rgba(80,60,168,0.20),rgba(60,90,178,0.14)); box-shadow:0 1px 0 rgba(255,255,255,0.06) inset; }

/* 다크: thumb */
body.dark .thumb {

body.dark .t-mc { background:linear-gradient(90deg,rgba(60,44,108,0.80),rgba(44,60,108,0.72)); }
body.dark .t-mc-gem { background:rgba(168,138,248,0.45); }
body.dark .t-mc-bar { background:linear-gradient(90deg,rgba(148,108,238,0.55),rgba(108,148,248,0.40)); }
body.dark .t0-line,.t1-line,.t2-line,.t3-line,.t4-line,.t4-title { opacity:0.6; filter:invert(1) hue-rotate(180deg); }
body.dark .t0-img { background:linear-gradient(145deg,rgba(60,100,178,0.68),rgba(70,60,168,0.68)); }
body.dark .t1-img { background:linear-gradient(135deg,rgba(60,90,178,0.55),rgba(80,60,168,0.44)); }
body.dark .t2-col-img { background:linear-gradient(145deg,rgba(60,100,178,0.55),rgba(80,60,168,0.45)); }
body.dark .t3-bigimg { background:rgba(50,70,168,0.52); }
body.dark .t3-overlay { background:rgba(22,16,44,0.96); }

/* 다크: tip 이미지 영역 */
body.dark #tipImg { filter:invert(1) hue-rotate(180deg) brightness(0.75); }

/* 다크: bc-text 내부 흰 배경 */
body.dark .bc-text { background:rgba(34,26,58,0.97); }
body.dark .bc-text::after { background:linear-gradient(0deg,rgba(18,14,36,0.70),transparent); }

/* 다크: bcLayouts 내부 흰 배경 (인라인 style 대응) */
body.dark .bc-body [style*="rgba(255,255,255,0.97)"],
body.dark .bc-body [style*="rgba(255,255,255,0.96)"] {
  background:rgba(34,26,58,0.97) !important;
}

/* 다크: bcLayouts 컬럼/오버레이 */
body.dark .bc-cols > div,
body.dark .bc-big-l1,
body.dark .bc-big-l2,
body.dark .bc-big-l3 { opacity:0.9; }

/* 다크: s2Layer 내부 흰 배경 */
body.dark #s2Layer [style*="rgba(255,255,255,0.97)"],
body.dark #s2Layer [style*="rgba(255,255,255,0.96)"],
body.dark #s2Layer [style*="background:rgba(255,255,255"] {
  background:rgba(34,26,58,0.97) !important;
}

/* 다크: thumb 내부 흰 배경 */
body.dark .t0-text,
body.dark .t1-text,
body.dark .t2-cols,
body.dark .t3-overlay,
body.dark .t4-text { background:rgba(34,26,58,0.97) !important; }

/* 다크: s2Layer는 JS에서 처리 */

.snbtn {
  font-size:11px;font-weight:600;letter-spacing:0.02em;
  color:rgba(108,82,198,0.55);
  background:transparent;border:none;cursor:pointer;

}

body {
  width:100vw; height:100vh; overflow:hidden;
  background:url('BG.png') center center / cover no-repeat;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  position:relative;
}

.bg-orb { position:fixed; border-radius:50%; pointer-events:none; }
.orb1 { width:580px;height:580px;background:radial-gradient(circle at 38% 38%,rgba(178,138,255,0.44) 0%,transparent 60%);filter:blur(90px);opacity:0.74;top:-150px;left:-130px;animation:orb1 16s ease-in-out infinite alternate; }
.orb2 { width:480px;height:480px;background:radial-gradient(circle at 55% 55%,rgba(98,195,255,0.40) 0%,transparent 62%);filter:blur(94px);opacity:0.70;bottom:-120px;right:-100px;animation:orb2 20s ease-in-out infinite alternate; }
.orb3 { width:320px;height:320px;background:radial-gradient(circle at 50% 50%,rgba(195,165,255,0.36) 0%,transparent 62%);filter:blur(74px);opacity:0.64;top:36%;left:60%;animation:orb3 13s ease-in-out infinite alternate; }
.orb4 { width:240px;height:240px;background:radial-gradient(circle at 50% 50%,rgba(148,205,255,0.34) 0%,transparent 62%);filter:blur(64px);opacity:0.60;top:8%;right:12%;animation:orb4 9s ease-in-out infinite alternate; }
.orb5 { width:200px;height:200px;background:radial-gradient(circle at 50% 50%,rgba(255,178,198,0.22) 0%,transparent 62%);filter:blur(80px);opacity:0.48;bottom:5%;left:38%;animation:orb5 11s ease-in-out infinite alternate; }
@keyframes orb1{0%{transform:translate(0,0)scale(1)}100%{transform:translate(65px,45px)scale(1.18)}}
@keyframes orb2{0%{transform:translate(0,0)scale(1)}100%{transform:translate(-55px,-38px)scale(1.12)}}
@keyframes orb3{0%{transform:translate(0,0)scale(1)}100%{transform:translate(-42px,32px)scale(0.88)}}
@keyframes orb4{0%{transform:translate(0,0)scale(1)}100%{transform:translate(20px,-25px)scale(1.08)}}
@keyframes orb5{0%{transform:translate(0,0)scale(1)}100%{transform:translate(-30px,20px)scale(1.15)}}

.scene {
  position:relative; width:560px; height:360px;
  display:flex; align-items:center; justify-content:center;
  perspective:1000px; z-index:1;
  flex-shrink:0;
  filter: hue-rotate(8deg) saturate(0.82);
  margin-top:32px;
}

/* ── 하단 텍스트 영역 ── */
.stage-caption {
  margin-bottom:0;
  text-align:center;
  pointer-events:none;
  z-index:50;
  width:480px;
  flex-shrink:0;
}
.stage-title {
  font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;

}
.stage-sub {
  margin-top:8px;
  font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;

/* ────────────────────────────────
   메인 슬라이드 컨테이너 360×202 (16:9)
   MC(36px) + BC(166px) 수직 배열
──────────────────────────────── */
.base-slide {
  position:absolute;
  width:360px; height:202px;
  top:calc(50% - 155px); left:calc(50% - 180px);
  background:linear-gradient(155deg,rgba(255,254,255,0.96) 0%,rgba(251,249,255,0.94) 50%,rgba(249,253,255,0.95) 100%);
  backdrop-filter:blur(40px) saturate(2.1) brightness(1.04);
  -webkit-backdrop-filter:blur(40px) saturate(2.1) brightness(1.04);
  border-radius:16px;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.99) inset,
    inset 1px 0 0 rgba(255,255,255,0.62),
    inset -1px 0 0 rgba(255,255,255,0.42),
    0 20px 60px rgba(108,82,198,0.10);
  border:none;
  box-shadow:
    0 20px 60px rgba(108,82,198,0.10);
  overflow:hidden;
  z-index:2;
}
.base-slide::before {
  content:'';position:absolute;top:-50%;left:-60%;width:60%;height:200%;
  background:linear-gradient(105deg,transparent 0%,rgba(255,255,255,0.12) 50%,transparent 100%);
  animation:glassShimmer 8s ease-in-out infinite;pointer-events:none;
  z-index:1;
}
/* inset 링 — BC 위에 항상 표시 */
.base-slide::after {
  content:'';position:absolute;inset:0;
  box-shadow:inset 0 0 12px 2px rgba(226,235,245,1.0);
  border-radius:16px;pointer-events:none;z-index:100;
}
body.dark .base-slide::after {
  box-shadow:inset 0 0 12px 2px rgba(60,44,88,0.65);
}
@keyframes glassShimmer{0%{transform:translateX(0);opacity:0}10%{opacity:1}40%{transform:translateX(800px);opacity:0.6}50%{transform:translateX(900px);opacity:0}100%{transform:translateX(900px);opacity:0}}

/* ── MC 영역: 슬라이드 타이틀 행 36px ── */
.mc-header {
  position:absolute;
  width:360px; height:36px;
  top:calc(50% - 155px); left:calc(50% - 180px);
  display:flex; align-items:center;
  padding:0 16px;
  z-index:4;
  background:transparent;
}
/* 타이틀 블록: 제목처럼 보이는 넓은 바 */
.mc-title-block {
  height:8px; border-radius:4px; width:0%;
  background:linear-gradient(90deg,rgba(108,68,205,0.55),rgba(82,132,228,0.38));
  flex-shrink:0;
  position:relative; overflow:hidden;
}
.mc-title-block::after {
  display:none;
}
/* 하위 호환용 (JS에서 mcBar 참조) */
.mc-bar {
  display:none;
  width:0%; position:relative; overflow:hidden;
}
.mc-bar.filled { }

/* ── BC 영역: MC 아래 텍스트+이미지 ── */
.bc-body {
  position:absolute;
  width:360px; height:166px;
  top:calc(50% - 155px + 36px); left:calc(50% - 180px);
  display:none;
  z-index:3;
  border-radius:0 0 16px 16px;
  overflow:hidden;

}
body.dark .bc-body {
}

/* BC 텍스트 영역 (좌) */
.bc-text {
  flex:1;
  padding:18px 16px 16px 18px;
  display:flex; flex-direction:column; gap:9px;
  background:transparent;
  position:relative;
}
.bc-text::after {
  content:'';position:absolute;bottom:0;left:0;right:0;height:28px;
  background:transparent;
  pointer-events:none;
}

/* trl 텍스트 라인 */
.trl {
  height:6px; border-radius:3px;
  background:linear-gradient(90deg,rgba(118,82,210,0.30),rgba(98,118,210,0.18));
  width:0%; position:relative; overflow:hidden; flex-shrink:0;
}
#trl0 { height:7px; background:linear-gradient(90deg,rgba(108,68,205,0.44),rgba(82,122,218,0.30)); }
#trl4 { height:5px; background:linear-gradient(90deg,rgba(118,82,210,0.18),rgba(98,118,210,0.10)); }
.trl::after {
  content:'';position:absolute;top:0;left:-60%;bottom:0;width:60%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.75),transparent);
  animation:shimmer 2.6s ease-in-out infinite;
}
#trl0::after{animation-delay:0s}#trl1::after{animation-delay:0.18s}
#trl2::after{animation-delay:0.36s}#trl3::after{animation-delay:0.54s}#trl4::after{animation-delay:0.72s}
@keyframes shimmer{0%{left:-60%}100%{left:110%}}

/* BC 이미지 영역 (우) */
.bc-image {
  width:120px; flex-shrink:0;
  background:linear-gradient(145deg,rgba(138,195,255,0.68) 0%,rgba(108,175,252,0.75) 30%,rgba(128,155,245,0.68) 65%,rgba(155,145,248,0.62) 100%);
  background-size:200% 200%;
  animation:imgBgAnim 6s ease-in-out infinite;
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
}
@keyframes imgBgAnim{0%{background-position:0% 0%}50%{background-position:100% 100%}100%{background-position:0% 0%}}
.bc-image::before {
  content:'';position:absolute;top:0;left:0;right:0;height:45%;
  background:linear-gradient(180deg,rgba(255,255,255,0.26) 0%,transparent 100%);
  pointer-events:none;z-index:1;
}
/* 좌측 구분선 */
.bc-image::after {
  content:'';position:absolute;top:10px;bottom:10px;left:0;width:1px;
  background:linear-gradient(180deg,transparent,rgba(255,255,255,0.55) 30%,rgba(255,255,255,0.55) 70%,transparent);
  z-index:2;
}
.img-fill {
  width:72%; height:65%;
  background:linear-gradient(135deg,rgba(200,230,255,0.55) 0%,rgba(168,210,255,0.68) 50%,rgba(185,220,255,0.55) 100%);
  background-size:200% 200%;
  animation:imgAnim 3.5s ease-in-out infinite;
  display:flex;align-items:center;justify-content:center;
  opacity:0;border-radius:8px;
  border:1px solid rgba(255,255,255,0.68);
  box-shadow:0 3px 10px rgba(82,128,228,0.22),0 1px 0 rgba(255,255,255,0.80) inset;
  z-index:2;position:relative;
}
@keyframes imgAnim{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.img-fill::after {
  content:'';position:absolute;top:0;left:-70%;width:70%;bottom:0;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,0.28),transparent);
  animation:imgShimmer 4.2s ease-in-out infinite;border-radius:8px;pointer-events:none;
}
@keyframes imgShimmer{0%{left:-70%;opacity:0}15%{opacity:1}55%{left:110%;opacity:0.7}60%,100%{left:110%;opacity:0}}
.img-icon {
  width:24px;height:18px;border:1.5px solid rgba(255,255,255,0.65);border-radius:4px;
  position:relative;background:rgba(255,255,255,0.28);
}
.img-icon::before {
  content:'';position:absolute;top:3px;left:2px;width:5px;height:5px;
  border-radius:50%;background:rgba(255,255,255,0.72);
}
.img-icon::after {
  content:'';position:absolute;bottom:0;left:0;right:0;height:8px;
  background:linear-gradient(135deg,rgba(168,215,255,0.60),rgba(138,188,245,0.70));
  border-radius:0 0 3px 3px;
}

/* ────────────────────────────────
   덱 카드들 — 16:9 비율
──────────────────────────────── */
.deck-container {
  position:absolute;width:320px;height:180px;
  left:calc(50% - 160px);top:calc(50% - 115px);
  transform-style:preserve-3d;opacity:0;
}
.deck-card {
  position:absolute;width:320px;height:180px;
  background:linear-gradient(150deg,rgba(255,253,255,0.97),rgba(248,244,255,0.95));

  -webkit-backdrop-filter:blur(36px) saturate(2.0) brightness(1.02);
  border-radius:14px;border:none;
  box-shadow:inset 0 0 12px 2px rgba(226,235,245,0.60),0 8px 16px rgba(108,82,198,0.008);
  overflow:hidden;opacity:0;
  transform:translateZ(0px) translateY(0px);
  backface-visibility:hidden;transform-origin:bottom center;
}
.deck-card::before {
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.90) 30%,rgba(255,255,255,0.90) 70%,transparent);
}

/* 파티클 */

<script>
const STAGE = 5000;
const REPEAT = 3; // Stage1 루프 수 (0,1,2)
const FADE  = 500; // 단계 간 페이드 전환 시간 (ms) — 페이드인+아웃 합산 1초

const scene         = document.getElementById('scene');
const baseSlide     = document.getElementById('baseSlide');
const mcHeader      = document.getElementById('mcHeader');
const mcBar         = document.getElementById('mcBar');
const bcBody        = document.getElementById('bcBody');
const imgFill       = document.getElementById('imgFill');
const trlEls        = [0,1,2,3,4].map(i=>document.getElementById('trl'+i));
const deckContainer = document.getElementById('deckContainer');
const deckCards     = [0,1,2,3,4].map(i=>document.getElementById('dc'+i));
const particleCont  = document.getElementById('particleContainer');
const thumbGallery  = document.getElementById('thumbGallery');
const thumbEls      = [0,1,2,3,4].map(i=>document.getElementById('thumb'+i));

// easing
const easeOut    = t => 1-Math.pow(1-t,3);
const easeOut4   = t => 1-Math.pow(1-t,4);
const easeOutExp = t => t===0 ? 0 : 1-Math.pow(2,-10*t);
const easeOutB2  = t => { const c=2.5*1.5; return 1+c*Math.pow(t-1,3)+(c-1)*Math.pow(t-1,2); };
const easeIO     = t => t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
const lerp       = (a,b,t) => a+(b-a)*t;

const raf2   = fn => setTimeout(()=>fn(performance.now()),16);
const waitMs = ms => new Promise(r=>setTimeout(r,ms));
function animA(dur,ease,cb){
  return new Promise(res=>{
    const s=performance.now();
    function f(n){ const t=Math.min((n-s)/dur,1); cb(ease(t),t); if(t<1)raf2(f); else res(); }
    raf2(f);
  });
}

// particle
let particleFired=false, particleStyleOk=false;
function fireParticles(){
  if(particleFired) return; particleFired=true;
  if(!particleStyleOk){
    particleStyleOk=true;
    const s=document.createElement('style');
    s.textContent=`
      @keyframes pA{0%{transform:translate(-50%,-50%)translate(0,0)scale(1);opacity:.95}100%{transform:translate(-50%,-50%)translate(var(--px),var(--py))scale(0);opacity:0}}
      @keyframes pB{0%{transform:translate(-50%,-50%)translate(0,0)scale(1)rotate(0deg);opacity:.90}100%{transform:translate(-50%,-50%)translate(var(--px),var(--py))scale(0)rotate(180deg);opacity:0}}
    `;
    document.head.appendChild(s);
  }
  particleCont.innerHTML='';
  const cols=['#b892e8','#8ac3f0','#dab8f8','#72ccde','#d0a8f8','#68d8a8','#f0b8d8','#a8e8d0'];
  for(let i=0;i<28;i++){
    const p=document.createElement('div');
    const a=(i/28)*Math.PI*2+(Math.random()-0.5)*0.4;
    const d=48+Math.random()*68;
    const col=cols[Math.floor(Math.random()*cols.length)];
    const sz=2+Math.random()*6;
    const isSquare=Math.random()<0.25;
    const dur=0.65+Math.random()*0.55;
    const delay=Math.random()*0.20;
    p.style.cssText=`position:absolute;left:50%;top:50%;width:${sz}px;height:${sz}px;
      border-radius:${isSquare?'2px':'50%'};background:${col};opacity:0;
      animation:${isSquare?'pB':'pA'} ${dur}s ${delay}s ease-out forwards;
      --px:${Math.cos(a)*d}px;--py:${Math.sin(a)*d}px`;
    particleCont.appendChild(p);
  }
}

// ── reset ──
function resetMC(){
  mcHeader.style.opacity='1';
  mcBar.style.width='76%';
  mcBar.classList.remove('filled');
}
function resetBC(){
  bcBody.style.display='none';
  bcBody.style.opacity='';
  bcBody.style.transform='';
  bcBody.style.transition='none';
  const fill=document.getElementById('imgFill');
  if(fill) fill.style.opacity='0';
  trlEls.forEach(el=>{ if(el) el.style.width='0%'; });
}
function resetDeck(){
  deckContainer.style.opacity='0';
  deckCards.forEach((dc,i)=>{
    dc.style.opacity='0';
    dc.style.transform='translateZ(0) translateY(0) rotate(0deg)';
    dc.style.zIndex=String(i+1);
    dc.style.boxShadow='';
  });
  particleFired=false;
  particleCont.innerHTML='';
}
function resetAll(){
  baseSlide.style.opacity='1';
  resetMC(); resetBC(); resetDeck();
  thumbGallery.style.opacity='0';
  thumbEls.forEach(t=>t.classList.remove('active'));
}

// ── BC 레이아웃 정의 (루프별) ──
// loopIdx 0→thumb2(2컬럼), 1→thumb3(큰이미지), 2→thumb4(텍스트+이미지)
const bcLayouts = [
  // loop 0: 2컬럼
  {
    thumbIdx: 2,
    html: `
      <div class="bc-cols" style="flex:1;display:flex;gap:0;overflow:hidden;">
        <div style="flex:1;padding:12px 10px 12px 14px;display:flex;flex-direction:column;gap:8px;
          background:transparent;">
          <div class="bc-col-img s2-img-fade" style="flex:0.9;border-radius:8px;
            background:linear-gradient(145deg,rgba(138,195,255,0.60),rgba(155,145,248,0.50));
            position:relative;overflow:hidden;">

// ── Stage 0: 썸네일 갤러리 → 순서 활성화 → 선택 BC fly-in ──
async function stage0Seq(){
  const layout = bcLayouts[loopIdx];
  const thumbIdx = layout.thumbIdx;

  // BC 레이아웃 세팅
  setBCLayout(loopIdx);
  setBCFull(loopIdx);

  // MC bar — 1단계는 처음부터 76% 고정
  mcBar.style.width='76%';
  mcBar.classList.add('filled');
  await waitMs(120);

  // 갤러리 fade-in (260ms)
  await animA(260,easeOut, e=>{ thumbGallery.style.opacity=String(e); });
  await waitMs(80);

  // 썸네일 순회 (각 200ms)
  for(let i=0;i<5;i++){
    if(i>0) thumbEls[i-1].classList.remove('active');
    thumbEls[i].classList.add('active');
    if(i===thumbIdx){ await waitMs(280); break; }
    await waitMs(200);
  }

  // 썸네일 위치 계산
  const GAL_LEFT=54, GAL_TOP=243;
  const TH_W=84, TH_H=47, TH_GAP=8, TH_MC_H=9;
  const srcBCx = GAL_LEFT + (TH_W+TH_GAP)*thumbIdx;
  const srcBCy = GAL_TOP + TH_MC_H;
  const srcBCw = TH_W;
  const BCW=360, BCH=166;
  const tX=100, tY=61;
  const sc0=srcBCw/BCW;
  const initX = srcBCx - (BCW-srcBCw)/2;
  const initY = srcBCy - (BCH-(TH_H-TH_MC_H))/2;

  const dispMode0 = (loopIdx===1||loopIdx===2)?'block':'flex';
  bcBody.style.cssText=`display:${dispMode0};position:absolute;left:0;top:0;width:${BCW}px;height:${BCH}px;overflow:hidden;opacity:0;z-index:10;transition:none;transform:translate(${initX}px,${initY}px) scale(${sc0}) rotate(1.5deg);transform-origin:center center;border-radius:0 0 16px 16px;`;
  setBCFull(loopIdx);

  // 썸네일 pulse (150ms)
  thumbEls[thumbIdx].style.transition='box-shadow 0.12s ease,transform 0.12s ease';
  thumbEls[thumbIdx].style.boxShadow='';
  thumbEls[thumbIdx].style.transform='scale(1.06)';
  await waitMs(120);
  thumbEls[thumbIdx].style.boxShadow='';
  thumbEls[thumbIdx].style.transform='scale(1)';
  thumbEls[thumbIdx].style.transition='none';
  await waitMs(60);

  // 갤러리 fade-out (병렬)
  animA(320,easeOut, e=>{ thumbGallery.style.opacity=String(1-e); });

  // fly-in 시작 직전: accent 색상 적용
  setBCColors(loopIdx, 'accent');

  // BC fly-in (540ms)
  await animA(540,easeOut,(e)=>{
    const x=lerp(initX,tX,e);
    const y=lerp(initY,tY,e);
    const sc=lerp(sc0,1,easeOut(e));
    const rz=lerp(1.5,0,easeOut(e));
    bcBody.style.transform=`translate(${x}px,${y}px) scale(${sc}) rotate(${rz}deg)`;
    bcBody.style.opacity=String(Math.min(e*2.2,1));
  });

  thumbGallery.style.opacity='0';
  const dispMode=(loopIdx===1||loopIdx===2)?'block':'flex';
  bcBody.style.cssText=`display:${dispMode};opacity:1;transform:none;position:absolute;left:calc(50% - 180px);top:calc(50% - 119px);width:360px;height:166px;overflow:hidden`;

  // 착지 후: 보라색으로 전환
  setBCColors(loopIdx, 'purple');

  // glow flash
  bcBody.style.boxShadow='0 0 0 3px rgba(148,98,238,0.50),0 0 22px rgba(128,82,218,0.24)';
  await waitMs(60);
  bcBody.style.transition='box-shadow 0.5s cubic-bezier(0.16,1,0.3,1)';
  bcBody.style.boxShadow='0 0 0 0px rgba(148,98,238,0),0 4px 16px rgba(118,72,198,0.08)';
  await waitMs(100);
  bcBody.style.transition='none';

  // 착지 감상: STAGE(5000) - 애니합산 만큼 대기
  // 애니합산 ≈ 480+120+260+80+(thumbIdx×200+280)+150+60+540+160 ≈ 2130~2730ms
  const thumbWait = thumbIdx * 200 + 280;
  const animTotal = 480+120+260+80+thumbWait+150+60+540+160;
  const holdMs = Math.max(STAGE - animTotal, 200);
  await waitMs(holdMs);
}

// 1-a/1-b/1-c × 2회 순서
const stage0Order = [0,1,2,0,1,2];
const stage0BtnIds = ['btn1a','btn1b','btn1c','btn1a','btn1b','btn1c'];

async function runStage0(){
  for(let i=0;i<stage0Order.length;i++){
    if(_stopped) return;
    loopIdx = stage0Order[i];
    setActiveBtn(stage0BtnIds[i]);
    resetAll();
    await stage0Seq();
    if(_stopped) return;
    // BC만 페이드아웃 (500ms)
    await animA(FADE,easeOut, e=>{ bcBody.style.opacity=String(1-e); });
    resetBC();
    mcBar.style.width='0%';
    mcBar.classList.remove('filled');
    thumbGallery.style.opacity='0';
  }
  // 전체 완료 → Stage1(2-a) 진입
  setActiveBtn('btn2a');
  startStage1();
}

// ── Stage 1: 콘텐츠 타이핑 어포던스 ──
function startStage1(){
  majorStage=1; cycleCount=0;
  loopIdx=s1Order[0];
  setActiveBtn(s1BtnIds[0]);
  setBCLayout(loopIdx);
  setBCColors(loopIdx, 'purple');
  const disp1=(loopIdx===1||loopIdx===2)?'block':'flex';
  // baseSlide/mcHeader는 현재 보이는 상태 유지, bcBody만 새로 세팅
  bcBody.style.cssText=`display:${disp1};opacity:0;transform:none;position:absolute;left:calc(50% - 180px);top:calc(50% - 119px);width:360px;height:166px;overflow:hidden`;
  mcBar.style.width='76%';
  mcBar.classList.remove('filled');
  const lineSelectors = [
    '.bc-col-l1','.bc-col-l2','.bc-col-l3','.bc-col-l4',
    '.bc-big-l1','.bc-big-l2','.bc-big-l3',
    '.bc-txt-l0','.bc-txt-l1','.bc-txt-l2','.bc-txt-l3'
  ];
  lineSelectors.forEach(sel=>{
    const el=bcBody.querySelector(sel);
    if(el) el.style.width='0%';
  });
  // baseSlide/mcHeader/bcBody 페이드인 후 RAF 루프 시작
  baseSlide.style.opacity='0'; mcHeader.style.opacity='0';
  animA(FADE,easeOut, e=>{
    const v=String(e);
    [baseSlide,mcHeader,bcBody].forEach(l=>{ l.style.opacity=v; });
  }).then(()=>{
    [baseSlide,mcHeader,bcBody].forEach(l=>{ l.style.opacity='1'; });
    cycleStart=performance.now();
    raf2(mainLoop);
  });
}

function animStage1(elapsed){
  const t=elapsed/STAGE;
  // opacity는 전환 코드에서 관리 — 여기선 건드리지 않음
  bcBody.style.transform='none';
  // 1단계에서 헤더 타이틀 바는 처음부터 76% 고정
  mcBar.style.width='76%';
  bcLayouts[loopIdx].animate(t);
}

// ── Stage 2: 슬라이드 콘텐츠 생성 ──
// 루프: 2-a → 2-b → 2-b → 2-a → ...
// 2-a: Stage1 마지막 프레임 유지 → 텍스트 타이핑 → 페이드아웃
// 2-b: 새 슬라이드 페이드인 → 텍스트/이미지 타이핑 → 페이드아웃

// ── Stage2 슬라이드 빌드 ──
// s2Layer를 매 사이클마다 완전히 새로 생성해서 DOM에 교체 → 이전 스타일 잔존 완전 차단
let s2Layer = null;

function createS2Layer(){
  // 기존 s2Layer 제거
  const old = document.getElementById('s2Layer');
  if(old) old.parentNode.removeChild(old);

  const el = document.createElement('div');
  el.id = 's2Layer';
  el.style.cssText = `
    position:absolute;
    width:432px;height:242px;
    top:calc(50% - 155px);left:calc(50% - 216px);
    border-radius:16px;overflow:hidden;
    background:linear-gradient(155deg,rgba(254,252,255,0.97),rgba(248,244,255,0.94),rgba(244,249,255,0.95));
    box-shadow:inset 0 0 12px 2px rgba(226,235,245,1.0),0 20px 60px rgba(108,82,198,0.10);
    border:none;
    opacity:0;z-index:10;pointer-events:none;
    backdrop-filter:blur(40px) saturate(2.1);
    -webkit-backdrop-filter:blur(40px) saturate(2.1);
  `;
  document.getElementById('scene').appendChild(el);
  s2Layer = el;
  return el;
}

function s2BuildLayout(container, bcIdx){
  const isBlock = (bcIdx===1||bcIdx===2);
  const bcHtml = bcLayouts[bcIdx].html;

  container.innerHTML = `
  <div style="position:absolute;top:0;left:0;right:0;height:36px;
    display:flex;align-items:center;padding:0 16px;background:transparent;">
    <div class="s2-mc-bar" style="height:8px;border-radius:4px;width:0%;flex-shrink:0;
      background:linear-gradient(90deg,rgba(108,68,205,0.55),rgba(82,132,228,0.38));
      transition:none;overflow:hidden;position:relative;"></div>
  </div>
  <div style="position:absolute;top:36px;left:0;right:0;bottom:0;
    display:${isBlock?'block':'flex'};overflow:hidden;">
    ${bcHtml}
  </div>`;

  // 이미지 요소 초기 opacity:0 세팅 (HTML에 s2-img-fade 클래스로 마킹됨)
  container.querySelectorAll('.s2-img-fade').forEach(el=>{ el.style.opacity='0'; });
}

function s2AnimLayout(container, bcIdx, t){
  // 1. 헤더 타이틀 바: 0 → 76%
  const mcBarEl = container.querySelector('.s2-mc-bar');
  if(mcBarEl) mcBarEl.style.width = easeOutExp(Math.min(t/0.55,1))*76+'%';

  // 2. 이미지 페이드인: opacity 0 → 1 (t=0~0.4 구간)
  const imgEls = container.querySelectorAll('.s2-img-fade');
  const imgOpacity = Math.min(t/0.4, 1);
  imgEls.forEach(el=>{ el.style.opacity = String(imgOpacity); });

  // 3. 텍스트 라인 애니메이션
  if(bcIdx===0){
    const cls=['bc-col-l1','bc-col-l2','bc-col-l3','bc-col-l4'];
    const ws=[80,62,72,88]; const ds=[0.03,0.14,0.25,0.36];
    cls.forEach((c,i)=>{
      const el=container.querySelector('.'+c);
      if(el && t>ds[i]) el.style.width=easeOutExp(Math.min((t-ds[i])/0.13,1))*ws[i]+'%';
    });
  } else if(bcIdx===1){
    const cls=['bc-big-l1','bc-big-l2','bc-big-l3'];
    const ws=[58,76,48]; const ds=[0.03,0.13,0.22];
    cls.forEach((c,i)=>{
      const el=container.querySelector('.'+c);
      if(el && t>ds[i]) el.style.width=easeOutExp(Math.min((t-ds[i])/0.13,1))*ws[i]+'%';
    });
  } else if(bcIdx===2){
    const cls=['bc-txt-l0','bc-txt-l1','bc-txt-l2','bc-txt-l3'];
    const ws=[82,68,90,60]; const ds=[0.05,0.18,0.31,0.44];
    cls.forEach((c,i)=>{
      const el=container.querySelector('.'+c);
      if(el && t>ds[i]) el.style.width=easeOutExp(Math.min((t-ds[i])/0.16,1))*ws[i]+'%';
    });
  }
}

// Stage 2 상태
let s2CycleIdx=0;
let s2AnimFn=null;

function s2SetupCycle(idx){
  s2AnimFn=null;

  // s2Layer 완전히 새로 생성 → 이전 스타일/내용 잔존 없음
  createS2Layer();

  // 1단계 레이어 숨기기
  baseSlide.style.opacity='0';
  mcHeader.style.opacity='0';
  bcBody.style.opacity='0';

  const bcIdx = idx % 3;
  s2BuildLayout(s2Layer, bcIdx);
  // opacity는 이미 createS2Layer에서 '0'으로 세팅됨
  s2AnimFn=(t)=>s2AnimLayout(s2Layer, bcIdx, t);
}

function animStage2(el){
  const t=el/STAGE;
  // opacity는 전환 코드에서 관리 — 여기선 콘텐츠 타이핑만
  s2Layer.style.pointerEvents='none';
  if(s2AnimFn) s2AnimFn(t);
}

// Stage1 순서: 2-a/2-b1/2-b2 × 1회 = 3사이클
const s1Order = [0,1,2];
const s1BtnIds = ['btn2a','btn2b1','btn2b2'];

// ── main rAF loop ──
let majorStage=1, cycleCount=0, cycleStart=null, inTrans=false;

function mainLoop(ts){
  if(_stopped) return;
  if(!cycleStart) cycleStart=ts;
  const el=ts-cycleStart;
  if(el>=STAGE && !inTrans){
    inTrans=true; cycleCount++;
    if(majorStage===1){
      if(cycleCount>=s1Order.length){
        // Stage1→2: bcBody/baseSlide 페이드아웃 후 Stage2 진입
        animA(FADE,easeOut, e=>{
          const v=String(1-e);
          [baseSlide,mcHeader,bcBody].forEach(l=>{ l.style.opacity=v; });
        }).then(()=>{
          [baseSlide,mcHeader,bcBody].forEach(l=>{ l.style.opacity='0'; });
          majorStage=2; cycleCount=0;
          s2CycleIdx=0;
          s2SetupCycle(0);
          // s2Layer 페이드인
          animA(FADE,easeOut, e=>{ s2Layer.style.opacity=String(e); }).then(()=>{
            s2Layer.style.opacity='1';
            setActiveBtn('btn2a');
            cycleStart=performance.now(); inTrans=false;
          });
        });
      } else {
        // Stage1 루프 간: bcBody 페이드아웃 → 레이아웃 교체 → 페이드인
        animA(FADE,easeOut, e=>{
          const v=String(1-e);
          [baseSlide,mcHeader,bcBody].forEach(l=>{ l.style.opacity=v; });
        }).then(()=>{
          loopIdx=s1Order[cycleCount];
          setActiveBtn(s1BtnIds[cycleCount]);
          setBCLayout(loopIdx);
          setBCColors(loopIdx, 'purple');
          const lineSelectors2 = [
            '.bc-col-l1','.bc-col-l2','.bc-col-l3','.bc-col-l4',
            '.bc-big-l1','.bc-big-l2','.bc-big-l3',
            '.bc-txt-l0','.bc-txt-l1','.bc-txt-l2','.bc-txt-l3'
          ];
          lineSelectors2.forEach(sel=>{
            const el2=bcBody.querySelector(sel);
            if(el2) el2.style.width='0%';
          });
          const disp2=(loopIdx===1||loopIdx===2)?'block':'flex';
          bcBody.style.cssText=`display:${disp2};opacity:0;transform:none;position:absolute;left:calc(50% - 180px);top:calc(50% - 119px);width:360px;height:166px;overflow:hidden`;
          mcBar.style.width='76%';
          animA(FADE,easeOut, e=>{
            const v=String(e);
            [baseSlide,mcHeader,bcBody].forEach(l=>{ l.style.opacity=v; });
          }).then(()=>{
            [baseSlide,mcHeader,bcBody].forEach(l=>{ l.style.opacity='1'; });
            cycleStart=performance.now(); inTrans=false;
          });
        });
      }
    } else if(majorStage===2){
      // Stage2 사이클 간: s2Layer 페이드아웃 → 교체 → 페이드인
      s2CycleIdx++;
      if(s2CycleIdx>=3){
        // Stage2→3: s2Layer 페이드아웃 후 Stage3 진입
        animA(FADE,easeOut, e=>{ s2Layer.style.opacity=String(1-e); }).then(()=>{
          s2Layer.style.opacity='0';
          majorStage=3; cycleCount=0;
          resetDeck();
          breatheStart=null; breatheFired=false;
          cycleStart=performance.now(); inTrans=false;
          setActiveBtn('btn3');
        });
      } else {
        // Stage2 다음 사이클: 페이드아웃 → 교체 → 페이드인
        animA(FADE,easeOut, e=>{ s2Layer.style.opacity=String(1-e); }).then(()=>{
          const s2Idx=s2CycleIdx%3;
          const s2Btns=['btn2a','btn2b1','btn2b2'];
          setActiveBtn(s2Btns[s2Idx]);
          s2SetupCycle(s2Idx);
          animA(FADE,easeOut, e=>{ s2Layer.style.opacity=String(e); }).then(()=>{
            s2Layer.style.opacity='1';
            cycleStart=performance.now(); inTrans=false;
          });
        });
      }
    } else {
      // Stage3: 무한 루프 — breatheStart 리셋 없이 연속 유지
      cycleStart=performance.now(); inTrans=false;
    }
  }
  if(!inTrans){
    const cEl=Math.min(ts-cycleStart,STAGE);
    if(majorStage===1) animStage1(cEl);
    else if(majorStage===2) animStage2(cEl);
    else animStage3(cEl);
  }
  if(document.hidden) setTimeout(()=>mainLoop(performance.now()),16);
  else requestAnimationFrame(mainLoop);
}

// ── Stage3: deck fan-out + breathe ──
const fanAngles=[-26,-13,0,13,26];
const fanX=[-52,-26,0,26,52];
const cardZ=[-64,-48,-32,-16,0];
const cardY=[-20,-15,-10,-5,0];
let breatheStart=null, breatheFired=false;

function animStage3(el){
  const t=el/STAGE;
  // Stage2→3 전환 시 이미 s2Layer가 페이드아웃됨 — 여기서 opacity 건드리지 않음
  if(t>0.08){
    deckContainer.style.opacity='1';
    const dT=Math.min((t-0.08)/0.92,1);
    const fanPeak=0.38, stackEnd=0.72;
    deckCards.forEach((dc,i)=>{
      const delay=i*0.045;
      if(dT>delay){
        dc.style.opacity=String(Math.min((dT-delay)/0.28*3.5,1));
        let rx,ty,tz,rz;
        if(dT<fanPeak){
          const fT=easeOut4(Math.min(dT/fanPeak,1));
          rz=fanAngles[i]*fT; rx=fanX[i]*fT; ty=0; tz=0;
        } else if(dT<stackEnd){
          const sT=easeOut((dT-fanPeak)/(stackEnd-fanPeak));
          rz=fanAngles[i]*(1-sT); rx=fanX[i]*(1-sT);
          tz=cardZ[i]*sT; ty=cardY[i]*sT;
        } else {
          // stack 완료 → breathe 시작
          if(!breatheFired){ breatheFired=true; }
          if(!breatheStart) breatheStart=performance.now();
          const bEl=performance.now()-breatheStart;
          const breathe=Math.sin(bEl/1000*Math.PI*2.2*0.45+i*0.28)*2.2;
          rz=0; rx=0; tz=cardZ[i]; ty=cardY[i]+breathe*(1-i*0.15);
        }
        dc.style.transform=`translateX(${rx}px) translateY(${ty}px) translateZ(${tz}px) rotate(${rz}deg)`;
        dc.style.zIndex=String(i+1);
      }
    });
  }
}

// ── 캡션 ──
const stageCaptions = {
  'btn1a': '내용에 맞는 레이아웃을 고르고 있어요',
  'btn1b': '내용에 맞는 레이아웃을 고르고 있어요',
  'btn1c': '내용에 맞는 레이아웃을 고르고 있어요',
  'btn2a': '페이지 구조와 콘텐츠를 채워가고 있어요',
  'btn2b1': '페이지 구조와 콘텐츠를 채워가고 있어요',
  'btn2b2': '페이지 구조와 콘텐츠를 채워가고 있어요',
  'btn3':  '프레젠테이션이 거의 완성됐어요',
};
const stageTitleEl = document.getElementById('stageTitle');
const stageSubEl   = document.getElementById('stageSub');

function updateCaption(btnId){
  const text = stageCaptions[btnId] || '';
  if(stageTitleEl.textContent !== text){
    stageTitleEl.style.transition='opacity 0.4s ease';
    stageTitleEl.style.opacity='0';
    setTimeout(()=>{
      stageTitleEl.textContent=text;
      stageTitleEl.style.opacity='1';
    },200);
  }
}

// ── 버튼 제어 ──

function setActiveBtn(id){
  document.querySelectorAll('.snbtn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById(id);
  if(el) el.classList.add('active');
  updateCaption(id);
}

function stopAll(){
  // rAF 루프 강제 중단 플래그
  _stopped=true;
  setTimeout(()=>{ _stopped=false; },50);
}
let _stopped=false;


function gotoStep(step){
  _stopped=true;
  setTimeout(()=>{
    _stopped=false;
    if(step==='1a'){ setActiveBtn('btn1a'); loopIdx=0; resetAll(); stage0Seq().then(()=>{ setActiveBtn('btn1b'); }); }
    else if(step==='1b'){ setActiveBtn('btn1b'); loopIdx=1; resetAll(); stage0Seq().then(()=>{ setActiveBtn('btn1c'); }); }
    else if(step==='1c'){ setActiveBtn('btn1c'); loopIdx=2; resetAll(); stage0Seq().then(()=>{ setActiveBtn('btn2a'); startStage1(); }); }
    else if(step==='2a'){  setActiveBtn('btn2a');  _startS2at(0); }
    else if(step==='2b1'){ setActiveBtn('btn2b1'); _startS2at(1); }
    else if(step==='2b2'){ setActiveBtn('btn2b2'); _startS2at(2); }
    else if(step==='3'){   setActiveBtn('btn3');   _startS3cycle(); }
  },30);
}

function _startS1cycle(idx){
  // Stage1 특정 루프 직접 시작
  majorStage=1; cycleCount=0; loopIdx=idx;
  setBCLayout(loopIdx);
  // 텍스트 라인 0% 리셋 (이전 루프 잔상 제거)
  const lineSelectors = [
    '.bc-col-l1','.bc-col-l2','.bc-col-l3','.bc-col-l4',
    '.bc-big-l1','.bc-big-l2','.bc-big-l3',
    '.bc-txt-l0','.bc-txt-l1','.bc-txt-l2','.bc-txt-l3'
  ];
  lineSelectors.forEach(sel=>{
    const el=bcBody.querySelector(sel);
    if(el) el.style.width='0%';
  });
  const disp=(loopIdx===1||loopIdx===2)?'block':'flex';
  baseSlide.style.opacity='1';
  mcHeader.style.opacity='1';
  bcBody.style.cssText=`display:${disp};opacity:1;transform:none;position:absolute;left:calc(50% - 180px);top:calc(50% - 119px);width:360px;height:166px;overflow:hidden`;
  mcBar.style.width='0%';
  mcBar.classList.remove('filled');
  s2Layer.style.opacity='0';
  s2Layer.style.pointerEvents='none';
  cycleStart=performance.now(); inTrans=false;
  raf2(mainLoop);
}

function _startS2cycle(){
  _startS2at(0);
}

// Stage3 직접 시작 (3 버튼)
function _startS3cycle(){
  majorStage=3; cycleCount=0;
  s2Layer.style.opacity='0';
  [baseSlide,mcHeader,bcBody].forEach(l=>{ l.style.opacity='0'; });
  resetDeck();
  breatheStart=null; breatheFired=false;
  cycleStart=performance.now(); inTrans=false;
  raf2(mainLoop);
}

// Stage2 특정 사이클 직접 시작 (2-a=0, 2-b1=1, 2-b2=2)
function _startS2at(cycleIdx){
  majorStage=2; cycleCount=0;
  s2CycleIdx=cycleIdx;
  // 1단계 레이어 숨기기 (mcBar 100% 노출 방지)
  [baseSlide,mcHeader,bcBody].forEach(l=>{ l.style.opacity='0'; });
  // bcBody를 loop2 상태로 준비
  loopIdx=2; setBCLayout(2);
  const disp='block';
  bcBody.style.cssText=`display:${disp};opacity:0;transform:none;position:absolute;left:calc(50% - 180px);top:calc(50% - 119px);width:360px;height:166px;overflow:hidden`;
  setBCFull(2);
  mcBar.style.width='76%';
  // s2SetupCycle 먼저 (내부에서 s2Layer.opacity='0' 세팅됨)
  s2SetupCycle(cycleIdx);
  // 그 후 opacity='1'로 바로 표시
  s2Layer.style.opacity='1';
  s2Layer.style.pointerEvents='none';
  cycleStart=performance.now(); inTrans=false;
  raf2(mainLoop);
}


// ── 다크모드 토글 ──
let isDark = false;

const DARK_S2 = 'linear-gradient(155deg,rgba(34,26,58,0.96),rgba(28,22,52,0.94),rgba(26,30,56,0.95))';
const DARK_S2_SHADOW = 'inset 0 0 12px 2px rgba(60,44,88,0.65),0 20px 60px rgba(255,255,255,0.024)';
const LIGHT_S2 = 'linear-gradient(155deg,rgba(255,254,255,0.97),rgba(251,248,255,0.95),rgba(249,253,255,0.96))';
const LIGHT_S2_SHADOW = 'inset 0 0 12px 2px rgba(226,235,245,1.0),0 20px 60px rgba(108,82,198,0.10)';

function applyDarkS2(){
  s2Layer.style.background = isDark ? DARK_S2 : LIGHT_S2;
  s2Layer.style.boxShadow  = isDark ? DARK_S2_SHADOW : LIGHT_S2_SHADOW;
  s2Layer.style.border = 'none';
}

const origS2Setup = s2SetupCycle;
function s2SetupCycleWrapped(idx){
  origS2Setup(idx);
  applyDarkS2();
}

const DARK_BG  = 'rgba(34,26,58,0.97)';
const LIGHT_BG = 'rgba(255,255,255,0.97)';

function applyDarkBCInner(container){
  if(!container) return;
  container.querySelectorAll('[style]').forEach(el=>{
    const s = el.style.background || el.style.backgroundColor || '';
    if(s.includes('255,255,255')){
      el.style.background = isDark ? DARK_BG : LIGHT_BG;
    }
  });
}

function toggleTheme(){
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('toggleIcon').textContent  = isDark ? '🌙' : '☀️';
  document.getElementById('toggleLabel').textContent = isDark ? '다크' : '라이트';
  applyDarkS2();
  applyDarkBCInner(bcBody);
  applyDarkBCInner(s2Layer);
}

// setBCLayout/s2SetupCycle 이후 다크 자동 적용
const _origSetBCLayout = setBCLayout;
setBCLayout = function(idx){ _origSetBCLayout(idx); if(isDark) applyDarkBCInner(bcBody); };

const _origS2Setup = s2SetupCycle;
s2SetupCycle = function(idx){ _origS2Setup(idx); applyDarkS2(); applyDarkBCInner(s2Layer); };

// kick-off
resetAll();
setActiveBtn('btn1a');
runStage0();
</script>
